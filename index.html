<style>

<body>

<div id="header"></div>

<script>
fetch("header.html")
.then(res => res.text())
.then(data => {

document.getElementById("header").innerHTML = data;

const btn = document.getElementById("menuBtn");
const menu = document.getElementById("menu");
const overlay = document.getElementById("overlay");

if(btn && menu){

btn.onclick = function(){
menu.classList.toggle("show");
overlay.classList.toggle("show");
btn.classList.toggle("active");
};

if(overlay){
overlay.onclick = function(){
menu.classList.remove("show");
overlay.classList.remove("show");
btn.classList.remove("active");
};
}

document.querySelectorAll(".menu a").forEach(link=>{
link.addEventListener("click", ()=>{
menu.classList.remove("show");
overlay.classList.remove("show");
btn.classList.remove("active");
});
});

}

});
</script>

<main>

<div class="hero">
<h1>BetTransparency</h1>
<p>Protegemos jogadores contra apostas ilegais em Portugal</p>
</div>

<div class="section verificador">

<h2>🔎 Verificar Operador</h2>

<input type="text" id="siteInput" placeholder="Ex: Betano">
<br><br>

<button onclick="verificarSite()">Verificar</button>

<div id="resultado"></div>

</div>

</main>

<div id="footer"></div>

<script>
fetch("footer.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("footer").innerHTML=data;
});
</script>

<script>

function normalizar(texto){
return texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}

function verificarSite(){

const inputRaw = document.getElementById("siteInput").value;
const input = normalizar(inputRaw);
const resultado = document.getElementById("resultado");

if(!input){
resultado.innerHTML="";
return;
}

Promise.all([
fetch("./data/blacklist.json").then(r=>r.json()),
fetch("./data/legal.json").then(r=>r.json())
])
.then(([b,l])=>{

const isLegal = l.find(x=>normalizar(x.nome)===input);
const isBlack = b.find(x=>normalizar(x.nome)===input);

/* 🔥 RESULTADO BONITO */

if(isLegal && isBlack){
resultado.innerHTML = `
<div class="result-box result-warning">
⚠️ ${inputRaw}
<small>Este operador é legal em Portugal apenas em domínio .pt</small>
</div>`;
return;
}

if(isLegal){
resultado.innerHTML = `
<div class="result-box result-legal">
✅ ${inputRaw}
<small>Operador legal em Portugal</small>
</div>`;
return;
}

if(isBlack){
resultado.innerHTML = `
<div class="result-box result-ilegal">
🚨 ${inputRaw}
<small>Operador ilegal identificado</small>
</div>`;
return;
}

resultado.innerHTML = `
<div class="result-box result-warning">
⚠️ ${inputRaw}
<small>Não encontrado na base de dados</small>
</div>`;

});

}

</script>

</body>
