<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>BetTransparency - Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#eef2f7;
color:#222;
}

main{
padding:50px 20px;
max-width:1000px;
margin:30px auto;
}

h1{
text-align:center;
color:#0b132b;
}

h2{
color:#0b132b;
}

.section{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
margin-bottom:30px;
}

.cards{
display:flex;
flex-wrap:wrap;
gap:20px;
margin-top:30px;
}

.card{
flex:1 1 calc(33% - 20px);
background:#f9fafd;
padding:20px;
border-radius:10px;
min-width:250px;
}

.btn{
display:inline-block;
padding:10px 18px;
background:#1c7ed6;
color:white;
text-decoration:none;
border-radius:6px;
margin-top:15px;
}

.verificador{
margin-top:40px;
padding:30px;
background:#f9fafd;
border-radius:12px;
text-align:center;
}

input{
padding:10px;
width:60%;
max-width:300px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
background:#1c7ed6;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#1864ab;
}

#resultado{
margin-top:20px;
font-weight:bold;
}

@media(max-width:992px){
.cards{flex-direction:column;}
.card{flex:1 1 100%;}
}
</style>
</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<script>
fetch("header.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("header").innerHTML=data;
});
</script>

<main>

<div class="section">

<h1>Bem-vindo ao BetTransparency</h1>

<p style="text-align:center;">
Projeto educativo que alerta jogadores sobre apostas online ilegais em Portugal.
</p>

<!-- VERIFICADOR -->

<div class="verificador">

<h2>🔎 Verificar Operador</h2>

<p>Escreva o nome do site:</p>

<input type="text" id="siteInput" placeholder="Ex: Betano">

<button onclick="verificarSite()">Verificar</button>

<div id="resultado"></div>

</div>

<!-- CARDS -->

<div class="cards">

<div class="card">
<h3>Verificação de Licença</h3>
<a class="btn" href="license.html">Verificar</a>
</div>

<div class="card">
<h3>Alertas Publicidade</h3>
<a class="btn" href="ads.html">Ver Análises</a>
</div>

<div class="card">
<h3>Lista Negra</h3>
<a class="btn" href="blacklist.html">Ver Blacklist</a>
</div>

</div>

</div>

</main>

<!-- FOOTER -->

<div id="footer"></div>

<script>
fetch("footer.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("footer").innerHTML=data;
});
</script>

<!-- SCRIPT DO VERIFICADOR -->

<script>

function verificarSite(){

const input=document.getElementById("siteInput").value.toLowerCase().trim();
const resultado=document.getElementById("resultado");

if(input===""){
resultado.innerHTML="Por favor escreva um nome.";
resultado.style.color="black";
return;
}

Promise.all([
fetch("./data/blacklist.json").then(res=>res.json()),
fetch("./data/legal.json").then(res=>res.json())
])

.then(([blacklist,legal])=>{

const ilegal=blacklist.find(item=>
item.nome.toLowerCase().includes(input)
);

if(ilegal){

resultado.innerHTML="🚨 Operador ILEGAL — Encontra-se na BLACKLIST.";
resultado.style.color="red";

guardarPesquisa(input);

return;
}

const legalEncontrado=legal.find(item=>
item.nome.toLowerCase().includes(input)
);

if (legalEncontrado) {

  const pagina = legalEncontrado.nome.toLowerCase().replace(/\s/g,"");

  resultado.innerHTML = `
  ✅ Operador LEGAL — Licenciado em Portugal.<br><br>
  <a href="operators/${pagina}.html"
  style="display:inline-block;padding:8px 15px;background:#1c7ed6;color:white;border-radius:6px;text-decoration:none;">
  Saber mais
  </a>
  `;

  resultado.style.color = "green";

  guardarPesquisa(input);

  return;
}

resultado.innerHTML="⚠️ Operador não encontrado na base de dados.";
resultado.style.color="#b8860b";

guardarPesquisa(input);

})

.catch(()=>{

resultado.innerHTML="Erro ao verificar operador.";
resultado.style.color="red";

});

}

function guardarPesquisa(nome){

fetch("https://script.google.com/macros/s/AKfycbxx9zX2qrg1uF8zWYEZmEsztZCKv4HYf2Yi5ibP2OCHZf2BCOCWYNs9yQnAU_hwLtPU/exec",{
method:"POST",
body:JSON.stringify({
nome:nome,
pais:"Portugal"
})
});

}

</script>

</body>
</html>
