<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<title>BetTransparency</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#eef2f7;
}

main{
padding:60px 20px;
max-width:1100px;
margin:auto;
}

.hero{
text-align:center;
padding:50px 20px;
background:linear-gradient(135deg,#1c7ed6,#1864ab);
color:white;
border-radius:14px;
margin-bottom:30px;
}

.section{
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
margin-bottom:30px;
}

.verificador{
text-align:center;
}

input{
padding:12px;
width:60%;
max-width:300px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#1c7ed6;
color:white;
font-weight:bold;
cursor:pointer;
font-size:16px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
}

.card{
background:#f9fafd;
padding:22px;
border-radius:12px;
border:1px solid #e6ecf2;
}

.btn{
display:inline-block;
padding:10px 18px;
background:#1c7ed6;
color:white;
text-decoration:none;
border-radius:8px;
margin-top:10px;
font-weight:bold;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
margin-top:20px;
}

.stat-card{
border-radius:18px;
padding:2px;
background:linear-gradient(135deg,#1c7ed6,#4dabf7);
}

.stat-inner{
background:white;
border-radius:16px;
padding:30px 20px;
text-align:center;
}

.stat-inner h3{
margin:0;
font-size:36px;
font-weight:800;
}

.stat-inner p{
margin-top:8px;
color:#666;
font-size:14px;
}

.legal{background:linear-gradient(135deg,#2f9e44,#51cf66);}
.ilegal{background:linear-gradient(135deg,#e03131,#ff6b6b);}
.pesquisa{background:linear-gradient(135deg,#f59f00,#ffd43b);}
.telegram{background:linear-gradient(135deg,#1c7ed6,#4dabf7);}

</style>

</head>

<body>

<main>

<div class="hero">
<h1>BetTransparency</h1>
<p>Protegemos jogadores contra apostas ilegais em Portugal</p>
</div>

<div class="section verificador">

<h2>🔎 Verificar Operador</h2>

<input type="text" id="siteInput" placeholder="Ex: Betano">
<br><br>

<button onclick="verificarSite()">Verificar</button>

<div id="resultado" style="margin-top:15px;font-weight:bold;"></div>

</div>

<div class="section">

<h2>📊 Estatísticas</h2>

<div class="stats">

<div class="stat-card legal">
<div class="stat-inner">
<h3 id="total-legais">0</h3>
<p>Operadores Legais</p>
</div>
</div>

<div class="stat-card ilegal">
<div class="stat-inner">
<h3 id="total-ilegais">0</h3>
<p>Websites Ilegais</p>
</div>
</div>

<div class="stat-card pesquisa">
<div class="stat-inner">
<h3 id="total-pesquisas">0</h3>
<p>Pesquisas realizadas</p>
</div>
</div>

<div class="stat-card telegram">
<div class="stat-inner">
<h3 id="total-telegram">0</h3>
<p>Grupos Telegram</p>
</div>
</div>

</div>

</div>

</main>

<script>

/* 🔥 NORMALIZAR */
function normalizar(texto){
return texto
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.trim();
}

/* 🔥 ENTER */
document.addEventListener("DOMContentLoaded", function(){

const input = document.getElementById("siteInput");

input.addEventListener("keydown", function(e){
if(e.key === "Enter"){
e.preventDefault();
verificarSite();
}
});

});

/* 🔎 VERIFICADOR */
function verificarSite(){

const inputRaw = document.getElementById("siteInput").value;
const input = normalizar(inputRaw);
const resultado = document.getElementById("resultado");

if(!input){
resultado.innerText="Escreve um nome";
return;
}

Promise.all([
fetch("./data/blacklist.json").then(r=>r.json()),
fetch("./data/legal.json").then(r=>r.json())
])

.then(([b,l])=>{

const ilegal = b.find(x => normalizar(x.nome) === input);
const legal = l.find(x => normalizar(x.nome) === input);

if(ilegal){
resultado.innerText="🚨 Operador ILEGAL";
resultado.style.color="red";
guardarPesquisa(inputRaw);
return;
}

if(legal){
resultado.innerText="✅ Operador LEGAL";
resultado.style.color="green";
guardarPesquisa(inputRaw);
return;
}

resultado.innerText="⚠️ Não encontrado";
resultado.style.color="orange";

guardarPesquisa(inputRaw);

});

}

/* 💾 GUARDAR PESQUISA */
function guardarPesquisa(nome){

fetch("https://script.google.com/macros/s/AKfycbzku91pCuvtA75AbQ-r25r5OmW4WSAnu5XUocGzKQ119TJR6o231PWPl_VsDSE_ryEQ/exec",{
method:"POST",
body:JSON.stringify({nome:nome})
});

}

/* 📊 STATS */
Promise.all([
fetch("./data/blacklist.json").then(r=>r.json()),
fetch("./data/legal.json").then(r=>r.json()),
fetch("./data/telegram.json").then(r=>r.json()),
fetch("https://script.google.com/macros/s/AKfycbzku91pCuvtA75AbQ-r25r5OmW4WSAnu5XUocGzKQ119TJR6o231PWPl_VsDSE_ryEQ/exec")
.then(r=>r.text())
.then(text=>{
try{
const data = JSON.parse(text);
return Array.isArray(data) ? data : [];
}catch{
return [];
}
})
])

.then(([b,l,t,p])=>{

animarNumero("total-ilegais", b.length);
animarNumero("total-legais", l.length);
animarNumero("total-telegram", t.length);
animarNumero("total-pesquisas", p.length);

});

/* 🔢 ANIMAÇÃO */
function animarNumero(id, valor){

let el = document.getElementById(id);
let atual = 0;

if(valor === 0){
el.innerText = 0;
return;
}

let incremento = Math.ceil(valor / 40);

let timer = setInterval(()=>{

atual += incremento;

if(atual >= valor){
el.innerText = valor;
clearInterval(timer);
}else{
el.innerText = atual;
}

},25);

}

</script>

</body>
</html>
