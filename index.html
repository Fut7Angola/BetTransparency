<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<title>BetTransparency - Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#eef2f7;
color:#222;
overflow-x:hidden;
}

main{
padding:50px 20px;
max-width:1000px;
margin:30px auto;
}

h1{
text-align:center;
color:#0b132b;
}

.section{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
margin-bottom:30px;
}

.cards{
display:flex;
flex-wrap:wrap;
gap:20px;
margin-top:30px;
}

.card{
flex:1 1 calc(33% - 20px);
background:#f9fafd;
padding:22px;
border-radius:12px;
min-width:250px;
border:1px solid #e6ecf2;
}

.btn{
display:inline-block;
padding:11px 20px;
background:#1c7ed6;
color:white;
text-decoration:none;
border-radius:8px;
margin-top:15px;
font-weight:bold;
}

.verificador{
margin-top:40px;
padding:35px;
background:white;
border-radius:14px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
border:1px solid #e6ecf2;
}

input{
padding:10px;
width:60%;
max-width:300px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
background:#1c7ed6;
color:white;
font-weight:bold;
cursor:pointer;
}

#resultado{
margin-top:20px;
font-weight:bold;
}

@media(max-width:992px){

.cards{
flex-direction:column;
}

.card{
flex:1 1 100%;
}

}

</style>
</head>

<body>

<div id="header"></div>

<script>

fetch("header.html")
.then(res => res.text())
.then(data => {

document.getElementById("header").innerHTML = data;

const btn = document.getElementById("menuBtn");
const menu = document.getElementById("menu");

if(btn && menu){
btn.onclick=function(){
menu.classList.toggle("show");
};
}

});

</script>

<main>

<div class="section">

<h1>Bem-vindo ao BetTransparency</h1>

<p style="text-align:center;">
Projeto educativo que alerta jogadores sobre apostas online ilegais em Portugal.
</p>

<div class="verificador">

<h2>🔎 Verificar Operador</h2>

<p>Escreva o nome do site:</p>

<input type="text" id="siteInput" placeholder="Ex: Betano">

<button onclick="verificarSite()">Verificar</button>

<div id="resultado"></div>

</div>

</div>

<div class="section">

<h2>Ferramentas</h2>

<div class="cards">

<div class="card">
<h3>Verificação de Licença</h3>
<a class="btn" href="license.html">Verificar</a>
</div>

<div class="card">
<h3>Alertas Publicidade</h3>
<a class="btn" href="ads.html">Ver Análises</a>
</div>

<div class="card">
<h3>Lista Negra</h3>
<a class="btn" href="blacklist.html">Ver Blacklist</a>
</div>

</div>

</div>

</main>

<div id="footer"></div>

<script>
fetch("footer.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("footer").innerHTML=data;
});
</script>

</body>
</html>
