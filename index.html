<style>

/* 🔹 TEU CSS ORIGINAL (não mexi) */
body{font-family:Arial,sans-serif;margin:0;background:#eef2f7;}
main{padding:60px 20px;max-width:1100px;margin:auto;}

.stat-inner{background:white;border-radius:16px;padding:30px 20px;text-align:center;}
.stat-inner h3{margin:0;font-size:36px;font-weight:800;}
.legal{background:linear-gradient(135deg,#2f9e44,#51cf66);}
.ilegal{background:linear-gradient(135deg,#e03131,#ff6b6b);}
.pesquisa{background:linear-gradient(135deg,#f59f00,#ffd43b);}
.telegram{background:linear-gradient(135deg,#1c7ed6,#4dabf7);}

/* 🔥 NOVO CARD BONITO */
.result-card{
margin-top:15px;
padding:18px;
border-radius:12px;
font-weight:bold;
}

.result-legal{
background:#d3f9d8;
border:1px solid #51cf66;
color:#2f9e44;
}

.result-ilegal{
background:#ffe3e3;
border:1px solid #ff6b6b;
color:#e03131;
}

background:#fff3bf;
border:1px solid #ffd43b;

<body>

<div id="header"></div>

<script>
fetch("header.html")
.then(res => res.text())
.then(data => {
document.getElementById("header").innerHTML = data;
});
</script>

<main>

<div class="hero">
<h1>BetTransparency</h1>
<p>Protegemos jogadores contra apostas ilegais em Portugal</p>
</div>

<div class="section verificador">

<h2>🔎 Verificar Operador</h2>

<input type="text" id="siteInput" placeholder="Ex: Betano">
<br><br>

<button onclick="verificarSite()">Verificar</button>

<div id="resultado"></div>

</div>

</main>

<div id="footer"></div>

<script>
fetch("footer.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("footer").innerHTML=data;
});
</script>

<script>

/* 🔹 FUNÇÃO ORIGINAL + MELHORADA */

function normalizar(texto){
return texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}

function verificarSite(){

const inputRaw = document.getElementById("siteInput").value;
const input = normalizar(inputRaw);
const resultado = document.getElementById("resultado");

if(!input){
resultado.innerHTML = "<div class='result-card result-alerta'>Escreve um nome</div>";
return;
}

Promise.all([
fetch("./data/blacklist.json").then(r=>r.json()),
fetch("./data/legal.json").then(r=>r.json())
])
.then(([b,l])=>{

const isLegal = l.find(x=>normalizar(x.nome)===input);
const isBlack = b.find(x=>normalizar(x.nome)===input);

/* 🔥 CASO MISTO */
if(isLegal && isBlack){
resultado.innerHTML = `
<div class="result-card result-alerta">
⚠️ Legal em Portugal (.pt) mas pode ser ilegal noutras regiões
</div>`;
return;
}

/* ✅ LEGAL */
if(isLegal){
resultado.innerHTML = `
<div class="result-card result-legal">
✅ Operador Legal em Portugal
</div>`;
return;
}

/* 🚨 ILEGAL */
if(isBlack){
resultado.innerHTML = `
<div class="result-card result-ilegal">
🚨 Operador ILEGAL
</div>`;
return;
}

/* ⚠️ NÃO ENCONTRADO */
resultado.innerHTML = `
<div class="result-card result-alerta">
⚠️ Não encontrado
</div>`;

});

}

</script>

</body>
