<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">

<title>BetTransparency | Verificar Casas de Apostas Legais em Portugal</title>

<meta name="description" content="Verifica se uma casa de apostas é legal em Portugal.">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#eef2f7;
}

main{
padding:60px 20px;
max-width:1100px;
margin:auto;
}

.hero{
text-align:center;
padding:50px 20px;
background:linear-gradient(135deg,#1c7ed6,#1864ab);
color:white;
border-radius:14px;
margin-bottom:30px;
}

.section{
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
margin-bottom:30px;
}

.verificador{
text-align:center;
}

input{
padding:12px;
width:60%;
max-width:300px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#1c7ed6;
color:white;
font-weight:bold;
cursor:pointer;
font-size:16px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
margin-top:20px;
}

.stat-card{
border-radius:18px;
padding:2px;
}

.stat-inner{
background:white;
border-radius:16px;
padding:30px 20px;
text-align:center;
}

.stat-inner h3{
margin:0;
font-size:36px;
font-weight:800;
}

.legal{background:linear-gradient(135deg,#2f9e44,#51cf66);}
.ilegal{background:linear-gradient(135deg,#e03131,#ff6b6b);}
.pesquisa{background:linear-gradient(135deg,#f59f00,#ffd43b);}
.telegram{background:linear-gradient(135deg,#1c7ed6,#4dabf7);}

</style>

</head>

<body>

<div id="header"></div>

<script>
fetch("header.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("header").innerHTML=data;
});
</script>

<main>

<div class="hero">
<h1>BetTransparency</h1>
<p>Protegemos jogadores contra apostas ilegais em Portugal</p>
</div>

<div class="section verificador">

<h2>🔎 Verificar Operador</h2>

<input type="text" id="siteInput" placeholder="Ex: Betano">
<br><br>

<button onclick="verificarSite()">Verificar</button>

<div id="resultado" style="margin-top:15px;font-weight:bold;"></div>

</div>

<div class="section">

<h2>📊 Estatísticas</h2>

<div class="stats">

<div class="stat-card legal">
<div class="stat-inner">
<h3 id="total-legais">0</h3>
<p>Operadores Legais 🇵🇹</p>
</div>
</div>

<div class="stat-card ilegal">
<div class="stat-inner">
<h3 id="total-ilegais">0</h3>
<p>Websites Ilegais</p>
</div>
</div>

<div class="stat-card pesquisa">
<div class="stat-inner">
<h3 id="total-pesquisas">0</h3>
<p>Pesquisas realizadas</p>
</div>
</div>

<div class="stat-card telegram">
<div class="stat-inner">
<h3 id="total-telegram">0</h3>
<p>Grupos Telegram</p>
</div>
</div>

</div>

</div>

</main>

<div id="footer"></div>

<script>
fetch("footer.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("footer").innerHTML=data;
});
</script>

<script>

/* NORMALIZAR */
function normalizar(texto){
return texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}

/* ENTER */
document.addEventListener("DOMContentLoaded", ()=>{
document.getElementById("siteInput").addEventListener("keydown", function(e){
if(e.key==="Enter"){
e.preventDefault();
verificarSite();
}
});
});

/* VERIFICADOR */
function verificarSite(){

const inputRaw = document.getElementById("siteInput").value;
const input = normalizar(inputRaw);
const resultado = document.getElementById("resultado");

if(!input){
resultado.innerText="Escreve um nome";
return;
}

Promise.all([
fetch("./data/blacklist.json").then(r=>r.json()),
fetch("./data/legal.json").then(r=>r.json())
])
.then(([b,l])=>{

if(b.find(x=>normalizar(x.nome)===input)){
resultado.innerText="🚨 Operador ILEGAL";
resultado.style.color="red";
guardarPesquisa(inputRaw);
return;
}

if(l.find(x=>normalizar(x.nome)===input)){
resultado.innerText="✅ Operador LEGAL";
resultado.style.color="green";
guardarPesquisa(inputRaw);
return;
}

resultado.innerText="⚠️ Não encontrado";
resultado.style.color="orange";
guardarPesquisa(inputRaw);

});

}

/* 🔥 GUARDAR (CORRIGIDO COM LINK NOVO) */
function guardarPesquisa(nome){

fetch("https://script.google.com/macros/s/AKfycbzZ7AIgAJYbcvqkpRVf-c6A3WQ3Uo_aLPmV5VorXJIvBnt7HP5c1p0lao3SAzs8l8D3/exec?nome=" + encodeURIComponent(nome));

}

/* STATS */
Promise.all([
fetch("./data/blacklist.json").then(r=>r.json()),
fetch("./data/legal.json").then(r=>r.json()),
fetch("./data/telegram.json").then(r=>r.json()),
fetch("https://script.google.com/macros/s/AKfycbzZ7AIgAJYbcvqkpRVf-c6A3WQ3Uo_aLPmV5VorXJIvBnt7HP5c1p0lao3SAzs8l8D3/exec")
.then(r=>r.json()).catch(()=>[])
])
.then(([b,l,t,p])=>{

animarNumero("total-ilegais", b.length);
animarNumero("total-legais", l.length);
animarNumero("total-telegram", t.length);

/* 🔥 CONTAR PESQUISAS */
animarNumero("total-pesquisas", p.length - 1);

});

/* ANIMAÇÃO */
function animarNumero(id, valor){

let el = document.getElementById(id);
let atual = 0;

if(valor <= 0){
el.innerText = 0;
return;
}

let incremento = Math.ceil(valor / 40);

let timer = setInterval(()=>{

atual += incremento;

if(atual >= valor){
el.innerText = valor;
clearInterval(timer);
}else{
el.innerText = atual;
}

},25);

}

</script>

</body>
</html>
