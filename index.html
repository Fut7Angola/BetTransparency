<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>BetTransparency - Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #eef2f7;
      color: #222;
      text-align: center;
    }

    main {
      max-width: 900px;
      margin: 60px auto;
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    h1 {
      color: #0b132b;
    }

    .verificador {
      margin-top: 40px;
      padding: 30px;
      background: #f9fafd;
      border-radius: 12px;
    }

    input {
      padding: 10px;
      width: 60%;
      max-width: 300px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      background: #1c7ed6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #1864ab;
    }

    #resultado {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<main>
  <h1>BetTransparency</h1>
  <p>Projeto educativo sobre apostas online em Portugal.</p>

  <div class="verificador">
    <h2>🔎 Verificar Operador</h2>
    <p>Escreva o nome do site:</p>

    <input type="text" id="siteInput" placeholder="Ex: Betano">
    <button onclick="verificarSite()">Verificar</button>

    <div id="resultado"></div>
  </div>
</main>

<script>
function verificarSite() {
  const input = document.getElementById("siteInput").value.trim().toLowerCase();
  const resultado = document.getElementById("resultado");

  if (input === "") {
    resultado.innerHTML = "Escreva um nome.";
    resultado.style.color = "black";
    return;
  }

  Promise.all([
    fetch("data/blacklist.json").then(res => res.json()),
    fetch("data/legal.json").then(res => res.json())
  ])
  .then(([blacklist, legal]) => {

    const ilegal = blacklist.some(item =>
      item.nome.trim().toLowerCase() === input
    );

    if (ilegal) {
      resultado.innerHTML = "🚨 Operador ILEGAL (Blacklist)";
      resultado.style.color = "red";
      return;
    }

    const legalEncontrado = legal.some(item =>
      item.nome.trim().toLowerCase() === input
    );

    if (legalEncontrado) {
      resultado.innerHTML = "✅ Operador LEGAL em Portugal";
      resultado.style.color = "green";
      return;
    }

    resultado.innerHTML = "⚠️ Operador não encontrado.";
    resultado.style.color = "#b8860b";

  })
  .catch(error => {
    console.error(error);
    resultado.innerHTML = "Erro ao carregar dados.";
    resultado.style.color = "red";
  });
}
</script>

</body>
</html>
