if(btn && menu){

btn.onclick = function(){

overlay.classList.toggle("show");
btn.classList.toggle("active");
};

if(overlay){
overlay.onclick = function(){
menu.classList.remove("show");
overlay.classList.remove("show");
btn.classList.remove("active");
};
}

document.querySelectorAll(".menu a").forEach(link=>{

overlay.classList.remove("show");
btn.classList.remove("active");
});
});

}

});
</script>

<script>

function normalizar(texto){
return texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}

function verificarSite(){

const inputRaw = document.getElementById("siteInput").value;
const input = normalizar(inputRaw);
const resultado = document.getElementById("resultado");

if(!input){
resultado.innerHTML="<div class='alert-box alert-orange'>Escreve um nome</div>";
return;
}

Promise.all([
fetch("./data/blacklist.json").then(r=>r.json()),
fetch("./data/legal.json").then(r=>r.json())
])
.then(([b,l])=>{

const isLegal = l.find(x=>normalizar(x.nome)===input);
const isBlack = b.find(x=>normalizar(x.nome)===input);

/* 🔥 ALERTA BONITO */
if(isLegal && isBlack){
resultado.innerHTML = `
<div class="alert-box alert-orange">
⚠️ Este operador é <b>legal em Portugal</b> (domínio .pt)<br>
Mas pode ser ilegal noutras versões (.com, etc).
</div>`;
guardarPesquisa(inputRaw);
return;
}

if(isLegal){
resultado.innerHTML = `
<div class="alert-box alert-green">
✅ Operador LEGAL em Portugal
</div>`;
guardarPesquisa(inputRaw);
return;
}

if(isBlack){
resultado.innerHTML = `
<div class="alert-box alert-red">
🚨 Operador ILEGAL
</div>`;
guardarPesquisa(inputRaw);
return;
}

resultado.innerHTML = `
<div class="alert-box alert-orange">
⚠️ Não encontrado na base de dados
</div>`;
guardarPesquisa(inputRaw);

});

}

function guardarPesquisa(nome){
fetch("https://script.google.com/macros/s/AKfycbzZ7AIgAJYbcvqkpRVf-c6A3WQ3Uo_aLPmV5VorXJIvBnt7HP5c1p0lao3SAzs8l8D3/exec?nome=" + encodeURIComponent(nome));
}

</script>
