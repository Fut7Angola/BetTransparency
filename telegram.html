<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<title>Telegram Suspeito</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#eef2f7;
margin:0;
}

main{
max-width:1000px;
margin:100px auto;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

/* 🔍 PESQUISA */
.search-box{
text-align:center;
margin-bottom:20px;
}

.search-box input{
width:100%;
max-width:400px;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

/* 🔥 GRID CORRIGIDO */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill, 160px);
justify-content:center;
gap:15px;
}

@media(max-width:768px){
.grid{
grid-template-columns:repeat(2,160px);
justify-content:center;
}
}

/* CARD */
.card{
position:relative;
background:white;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.2s;
aspect-ratio:1/1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:10px;
width:160px;
}

.card:hover{
transform:translateY(-3px);
}

.card::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:url("/images/telegram.jpg") center/cover no-repeat;
opacity:0.08;
}

.card h3{
margin:0;
font-size:14px;
color:#b00020;
z-index:2;
}

.icon{
margin-top:8px;
font-size:20px;
z-index:2;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:2000;
}

.modal-content{
background:white;
padding:20px;
border-radius:12px;
width:90%;
max-width:500px;
max-height:85vh;
overflow-y:auto;
position:relative;
}

.close{
position:absolute;
top:10px;
right:15px;
cursor:pointer;
font-size:20px;
}

textarea, input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
margin-top:8px;
}

button{
background:#1c7ed6;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
margin-top:8px;
}

.comment-box{
background:#f1f3f5;
padding:10px;
border-radius:8px;
margin-top:10px;
}

</style>

</head>

<body>

<div id="header"></div>

<main>

<h1>🚨 Grupos Telegram Suspeitos</h1>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Pesquisar grupo...">
</div>

<div id="container" class="grid"></div>

</main>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">

<span class="close" onclick="fecharModal()">✖</span>

<h2 id="modal-nome"></h2>
<p id="modal-motivo"></p>

<a id="modal-link" target="_blank">Abrir Telegram</a>

<button onclick="denunciar()">🚨 Denunciar</button>

<h3>💬 Comentários</h3>

<input id="user" placeholder="Nome ou Anónimo">
<textarea id="input"></textarea>
<button onclick="comentar()">Enviar</button>

<div id="comments">A carregar...</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyB8zs1zhEmHeDZTyNwzKVx3LUUnmElMTec",
authDomain:"bettransparency.firebaseapp.com",
projectId:"bettransparency",
appId:"1:493636447089:web:f5ceb8146a11a5b60364d0"
});

const db = getFirestore(app);
signInAnonymously(getAuth());

fetch("header.html")
.then(res => res.text())
.then(data => {
document.getElementById("header").innerHTML = data;
});

let todosGrupos = [];

fetch("./data/telegram.json")
.then(r => r.json())
.then(data => {
todosGrupos = data.sort((a,b)=>
a.nome.localeCompare(b.nome,'pt',{sensitivity:'base'})
);
render(todosGrupos);
});

document.getElementById("searchInput").addEventListener("input", function(){

const termo = this.value.toLowerCase();

const filtrado = todosGrupos.filter(item =>
item.nome.toLowerCase().includes(termo)
);

render(filtrado);

});

function render(lista){

const container=document.getElementById("container");
container.innerHTML="";

lista.forEach(item=>{

const div=document.createElement("div");
div.className="card";

let icon="⚠️";
if(item.tipo==="perigo") icon="🚨";
if(item.tipo==="spam") icon="📛";
if(item.tipo==="analise") icon="🔍";

div.innerHTML=`
<h3>${item.nome}</h3>
<div class="icon">${icon}</div>
`;

div.onclick=()=>abrirModal(item);

container.appendChild(div);

});

}

let grupoAtual="";

window.abrirModal=function(item){

grupoAtual=item.nome;

document.getElementById("modal").style.display="flex";
document.getElementById("modal-nome").innerText=item.nome;
document.getElementById("modal-motivo").innerText=item.motivo;

const link=document.getElementById("modal-link");
link.href=item.link;

carregarComentarios();

}

window.fecharModal=function(){
document.getElementById("modal").style.display="none";
}

window.denunciar=async function(){

await addDoc(collection(db,"denuncias_telegram"),{
grupo:grupoAtual,
data:Date.now()
});

alert("Denúncia enviada 🚨");

}

window.comentar=async function(){

const text=document.getElementById("input").value;
const user=document.getElementById("user").value || "Anónimo";

if(!text)return;

await addDoc(collection(db,"comentarios_telegram"),{
grupo:grupoAtual,
user,
text,
data:Date.now()
});

document.getElementById("input").value="";
carregarComentarios();

}

async function carregarComentarios(){

const q=query(collection(db,"comentarios_telegram"),where("grupo","==",grupoAtual));
const res=await getDocs(q);

let html="";

res.forEach(doc=>{
const d=doc.data();

html+=`
<div class="comment-box">
<strong>${d.user}</strong>
<p>${d.text}</p>
</div>
`;
});

document.getElementById("comments").innerHTML =
html || "Sem comentários";

}

</script>

<div id="footer"></div>

<script>
fetch("header.html")
.then(res => res.text())
.then(data => {

document.getElementById("header").innerHTML = data;

/* 🔥 MENU MOBILE CORRETO */
const btn = document.getElementById("menuBtn");
const menu = document.getElementById("menu");
const overlay = document.getElementById("overlay");
const dropdown = document.getElementById("dropdownBtn");

if(btn && menu){

btn.onclick = function(){
menu.classList.toggle("show");
overlay.classList.toggle("show");
btn.classList.toggle("active");
};

/* fechar ao clicar fora */
if(overlay){
overlay.onclick = function(){
menu.classList.remove("show");
overlay.classList.remove("show");
btn.classList.remove("active");
};
}

/* dropdown mobile */
if(dropdown){
dropdown.onclick = function(){
if(window.innerWidth < 768){
this.classList.toggle("active");
}
};
}

/* fechar ao clicar num link */
document.querySelectorAll(".menu a").forEach(link=>{
link.addEventListener("click", ()=>{
menu.classList.remove("show");
overlay.classList.remove("show");
btn.classList.remove("active");
});
});

}

});
</script>


</body>
</html>
