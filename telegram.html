<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<title>Telegram Suspeito</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#eef2f7;
margin:0;
}

main{
max-width:1000px;
margin:100px auto;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

/* CARD PEQUENO */
.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
cursor:pointer;
text-align:center;
transition:0.2s;
}

.card:hover{
transform:translateY(-3px);
}

.card h3{
margin:0;
font-size:16px;
color:#b00020;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:2000;
}

.modal-content{
background:white;
padding:20px;
border-radius:12px;
width:90%;
max-width:500px;

/* 🔥 FIX MOBILE */
max-height:80vh;
overflow-y:auto;
}

.close{
float:right;
cursor:pointer;
font-size:20px;
}

/* COMMENTS */
textarea, input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
margin-top:8px;
font-size:16px;
}

button{
background:#1c7ed6;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
margin-top:8px;
}

.comment-box{
background:#f1f3f5;
padding:10px;
border-radius:8px;
margin-top:10px;
}

</style>

</head>

<body>

<div id="header"></div>

<main>

<h1>🚨 Grupos Telegram Suspeitos</h1>

<div id="container" class="grid"></div>

</main>

<!-- MODAL -->
<div id="modal" class="modal">

<div class="modal-content">

<span class="close" onclick="fecharModal()">✖</span>

<h2 id="modal-nome"></h2>

<p id="modal-motivo"></p>

<a id="modal-link" target="_blank">Abrir Telegram</a>

<div style="margin-top:10px;">
<button onclick="denunciar()">🚨 Denunciar</button>
</div>

<div class="comments">

<h3>💬 Comentários</h3>

<input id="user" placeholder="Nome ou Anónimo">

<textarea id="input" placeholder="Escreve comentário"></textarea>

<button onclick="comentar()">Enviar</button>

<div id="comments">A carregar...</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* FIREBASE */
const app = initializeApp({
apiKey:"AIzaSyB8zs1zhEmHeDZTyNwzKVx3LUUnmElMTec",
authDomain:"bettransparency.firebaseapp.com",
projectId:"bettransparency",
appId:"1:493636447089:web:f5ceb8146a11a5b60364d0"
});

const db = getFirestore(app);
signInAnonymously(getAuth());

/* HEADER */
fetch("header.html")
.then(r=>r.text())
.then(d=>{
document.getElementById("header").innerHTML=d;

/* 🔥 ATIVAR MENU MOBILE */
const btn = document.getElementById("menuBtn");
const menu = document.getElementById("menu");

if(btn && menu){

btn.onclick = function(){
menu.classList.toggle("show");
};

/* fechar ao clicar fora */
document.addEventListener("click", function(e){
if(!menu.contains(e.target) && !btn.contains(e.target)){
menu.classList.remove("show");
}
});

}
});

/* LISTA */
const lista = [
{nome:"Fábio M. Tipster",link:"https://t.me/+czVC2wto03syYmQ8",motivo:"Promoção ilegal"},
{nome:"Stake 10 Fútbol",link:"https://t.me/+MFlAFi3xutcyYTQ0",motivo:"Redirecionamento ilegal"},
{nome:"Tips Advisor",link:"https://t.me/+OoS_aiiSa1ZiM2U0",motivo:"Operadores ilegais"}
];

/* RENDER */
const container=document.getElementById("container");

lista.forEach(item=>{

const div=document.createElement("div");

div.className="card";

div.innerHTML=`
<h3>${item.nome}</h3>
<p style="font-size:12px;color:#666;">Ver detalhes</p>
`;

div.onclick=()=>abrirModal(item);

container.appendChild(div);

});

/* MODAL */
let grupoAtual="";

window.abrirModal = function(item){

grupoAtual=item.nome;

document.getElementById("modal").style.display="flex";
document.getElementById("modal-nome").innerText=item.nome;
document.getElementById("modal-motivo").innerText=item.motivo;

const link=document.getElementById("modal-link");
link.href=item.link;
link.innerText="Abrir no Telegram";

carregarComentarios();

}

window.fecharModal = function(){
document.getElementById("modal").style.display="none";
}

/* FECHAR AO CLICAR FORA */
document.getElementById("modal").onclick = function(e){
if(e.target.id==="modal") fecharModal();
}

/* DENUNCIAR */
window.denunciar = async function(){

await addDoc(collection(db,"denuncias_telegram"),{
grupo:grupoAtual,
data:Date.now()
});

alert("Denúncia enviada 🚨");

}

/* COMENTAR */
window.comentar = async function(){

const text=document.getElementById("input").value;
const user=document.getElementById("user").value || "Anónimo";

if(!text)return alert("Escreve algo");

await addDoc(collection(db,"comentarios_telegram"),{
grupo:grupoAtual,
user,
text,
data:Date.now()
});

document.getElementById("input").value="";

carregarComentarios();

}

/* CARREGAR COMENTÁRIOS */
async function carregarComentarios(){

const q=query(collection(db,"comentarios_telegram"),where("grupo","==",grupoAtual));
const res=await getDocs(q);

let html="";

res.forEach(doc=>{
const d=doc.data();

html+=`
<div class="comment-box">
<strong>${d.user}</strong>
<p>${d.text}</p>
</div>
`;
});

document.getElementById("comments").innerHTML =
html || "Sem comentários";

}

</script>

<div id="footer"></div>

<script>
fetch("footer.html")
.then(r=>r.text())
.then(d=>{
document.getElementById("footer").innerHTML=d;
});
</script>

</body>
</html>
