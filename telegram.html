function render(list){

const c=document.getElementById("container");
c.innerHTML="";

list.forEach(item=>{

const div=document.createElement("div");

div.className="card";

div.innerHTML=`

<div class="badge">⚠️ Suspeito</div>

<h2>${item.nome}</h2>

<p><strong>Motivo:</strong> ${item.motivo}</p>
<p><strong>Data:</strong> ${item.data}</p>

<a href="${item.link}" target="_blank">Abrir no Telegram</a>

<div style="margin-top:10px;">
<button onclick="denunciar('${item.nome}')">🚨 Denunciar grupo</button>
</div>

<div class="comments">

<h3>💬 Comentários</h3>

<input id="user-${item.nome}" placeholder="Nickname ou Anónimo">

<textarea id="input-${item.nome}" placeholder="Escreve um comentário"></textarea>

<button onclick="comentar('${item.nome}')">Enviar</button>

<div id="comments-${item.nome}">A carregar...</div>

</div>
`;

c.appendChild(div);

carregarComentarios(item.nome);

});

}

/* DENUNCIAR */
window.denunciar = async function(nome){

await addDoc(collection(db,"denuncias_telegram"),{
grupo:nome,
data:Date.now()
});

alert("Denúncia enviada 🚨");

}

/* COMENTAR */
window.comentar = async function(nome){

const text=document.getElementById("input-"+nome).value;
const user=document.getElementById("user-"+nome).value || "Anónimo";

if(!text)return alert("Escreve algo");

await addDoc(collection(db,"comentarios_telegram"),{
grupo:nome,
user:user,
text:text,
data:Date.now()
});

document.getElementById("input-"+nome).value="";

carregarComentarios(nome);

}

/* CARREGAR COMENTÁRIOS */
async function carregarComentarios(nome){

const q=query(collection(db,"comentarios_telegram"),where("grupo","==",nome));

const res=await getDocs(q);

let html="";

res.forEach(doc=>{

const d=doc.data();

html+=`
<div class="comment-box">
<strong>${d.user}</strong>
<p>${d.text}</p>
</div>
`;

});

document.getElementById("comments-"+nome).innerHTML =
html || "Sem comentários";

}
