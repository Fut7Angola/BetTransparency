<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<title>Blacklist Telegram</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#eef2f7;
margin:0;
}

main{
max-width:1000px;
margin:100px auto;
background:white;
padding:20px;
border-radius:10px;
}

.card{
border:1px solid #ddd;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

.badge{
background:#ff4d4f;
color:white;
padding:5px 10px;
border-radius:6px;
font-size:12px;
}

a{
color:#1c7ed6;
font-weight:bold;
text-decoration:none;
}

.comments{
margin-top:15px;
padding-top:10px;
border-top:1px solid #eee;
}

textarea{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
margin-top:10px;
resize:none;
}

input{
width:100%;
padding:8px;
border-radius:8px;
border:1px solid #ddd;
margin-top:5px;
}

button{
background:#1c7ed6;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
margin-top:8px;
}

button:hover{
background:#1864ab;
}

.comment-box{
background:#f1f3f5;
padding:10px;
border-radius:8px;
margin-top:10px;
}

</style>

</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<main>

<h1>🚨 Grupos de Telegram suspeitos</h1>

<div id="container">A carregar...</div>

</main>

<!-- 🔥 SCRIPT PRINCIPAL -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyB8zs1zhEmHeDZTyNwzKVx3LUUnmElMTec",
authDomain: "bettransparency.firebaseapp.com",
projectId: "bettransparency",
appId: "1:493636447089:web:f5ceb8146a11a5b60364d0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
signInAnonymously(getAuth());

/* HEADER */
fetch("header.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("header").innerHTML=data;

const btn=document.getElementById("menuBtn");
const menu=document.getElementById("menu");

if(btn && menu){
btn.onclick=()=>menu.classList.toggle("show");
}
});

/* 🔥 LISTA DOS GRUPOS (A TUA) */
const lista = [
{
nome: "Fábio M. Tipster",
link: "https://t.me/+czVC2wto03syYmQ8",
motivo: "Promoção de casas ilegais",
data: "17-03-2026"
},
{
nome: "Stake 10 Fútbol",
link: "https://t.me/+MFlAFi3xutcyYTQ0",
motivo: "Redirecionamento para operadores não licenciados",
data: "17-03-2026"
}
];

/* RENDER */
render(lista);

function render(list){

const c=document.getElementById("container");
c.innerHTML="";

list.forEach(item=>{

const div=document.createElement("div");

div.className="card";

div.innerHTML=`

<div class="badge">⚠️ Suspeito</div>

<h2>${item.nome}</h2>

<p><strong>Motivo:</strong> ${item.motivo}</p>
<p><strong>Data:</strong> ${item.data}</p>

<a href="${item.link}" target="_blank">Abrir no Telegram</a>

<div style="margin-top:10px;">
<button onclick="denunciar('${item.nome}')">🚨 Denunciar grupo</button>
</div>

<div class="comments">

<h3>💬 Comentários</h3>

<input id="user-${item.nome}" placeholder="Nickname ou Anónimo">

<textarea id="input-${item.nome}" placeholder="Escreve um comentário"></textarea>

<button onclick="comentar('${item.nome}')">Enviar</button>

<div id="comments-${item.nome}">A carregar...</div>

</div>
`;

c.appendChild(div);

carregarComentarios(item.nome);

});

}

/* DENUNCIAR */
window.denunciar = async function(nome){

await addDoc(collection(db,"denuncias_telegram"),{
grupo:nome,
data:Date.now()
});

alert("Denúncia enviada 🚨");

}

/* COMENTAR */
window.comentar = async function(nome){

const text=document.getElementById("input-"+nome).value;
const user=document.getElementById("user-"+nome).value || "Anónimo";

if(!text)return alert("Escreve algo");

await addDoc(collection(db,"comentarios_telegram"),{
grupo:nome,
user:user,
text:text,
data:Date.now()
});

document.getElementById("input-"+nome).value="";

carregarComentarios(nome);

}

/* CARREGAR COMENTÁRIOS */
async function carregarComentarios(nome){

const q=query(collection(db,"comentarios_telegram"),where("grupo","==",nome));

const res=await getDocs(q);

let html="";

res.forEach(doc=>{

const d=doc.data();

html+=`
<div class="comment-box">
<strong>${d.user}</strong>
<p>${d.text}</p>
</div>
`;

});

document.getElementById("comments-"+nome).innerHTML =
html || "Sem comentários";

}

</script>

<!-- FOOTER -->
<div id="footer"></div>

<script>
fetch("footer.html")
.then(r=>r.text())
.then(d=>{
document.getElementById("footer").innerHTML=d;
});
</script>

</body>
</html>
