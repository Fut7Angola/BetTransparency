<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<title>Blacklist - Operadores Ilegais</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#eef2f7;
color:#222;
}

main{
padding:90px 20px;
max-width:1000px;
margin:auto;
}

h1{
text-align:center;
color:#0b132b;
margin-bottom:20px;
}

.card{
background:white;
border-radius:12px;
padding:20px;
margin-bottom:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
transition:0.2s;
}

.card:hover{
transform:translateY(-2px);
}

.badge{
background:#ff4d4f;
color:white;
padding:5px 10px;
border-radius:20px;
font-size:12px;
display:inline-block;
margin-bottom:10px;
}

h2{
margin:5px 0;
}

a{
color:#1c7ed6;
text-decoration:none;
font-weight:bold;
}

.comments{
margin-top:15px;
padding-top:10px;
border-top:1px solid #eee;
}

textarea{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
margin-top:10px;
resize:none;
}

input, select{
padding:8px;
border-radius:8px;
border:1px solid #ddd;
margin-top:5px;
}

button{
background:#1c7ed6;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
margin-top:8px;
}

button:hover{
background:#1864ab;
}

.comment-box{
background:#f1f3f5;
padding:10px;
border-radius:8px;
margin-top:10px;
}

.comment-user{
font-weight:bold;
color:#0b132b;
}

.rating{
color:#f59f00;
font-weight:bold;
}

.actions button{
background:#e9ecef;
color:#333;
margin-right:5px;
}

.score{
margin-top:10px;
font-weight:bold;
color:#0b132b;
}
</style>

</head>

<body>

<div id="header"></div>

<script>
fetch("header.html")
.then(r=>r.text())
.then(d=>{
document.getElementById("header").innerHTML=d;

/* 🔥 ATIVAR MENU */

const btn = document.getElementById("menuBtn");
const menu = document.getElementById("menu");

if(btn && menu){

btn.addEventListener("click", function(){
menu.classList.toggle("show");
});

/* FECHAR MENU AO CLICAR NUM LINK (MOBILE) */

menu.querySelectorAll("a").forEach(link=>{
link.addEventListener("click", ()=>{
menu.classList.remove("show");
});
});

}

});
  
</script>

<main>

<h1>🚨 Lista Negra</h1>

<div class="warning">
Operadores sem licença em Portugal.
</div>

<div class="counter" id="site-counter">A carregar...</div>

<input id="searchInput" placeholder="Pesquisar...">

<div id="blacklist-container"></div>

</main>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyB8zs1zhEmHeDZTyNwzKVx3LUUnmElMTec",
authDomain: "bettransparency.firebaseapp.com",
projectId: "bettransparency",
appId: "1:493636447089:web:f5ceb8146a11a5b60364d0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
signInAnonymously(getAuth());

let blacklist=[];

async function carregar(){

const res = await fetch("/BetTransparency/data/blacklist.json");
blacklist = await res.json();

render(blacklist);

}

carregar();

function render(lista){

const container=document.getElementById("blacklist-container");
container.innerHTML="";

document.getElementById("site-counter").innerText =
"Total: "+lista.length;

lista.forEach(item=>{

const div=document.createElement("div");

div.className="card";

div.innerHTML=`
<div class="badge">Alto risco</div>

<h2>${item.nome}</h2>

<div class="score" id="score-${item.nome}"></div>

<p>${item.motivo}</p>

<a href="${item.website}" target="_blank">Abrir site</a>

<div class="comments">

<h3>⭐ Avaliação</h3>

<select id="rating-${item.nome}">
<option value="5">⭐⭐⭐⭐⭐ Excelente</option>
<option value="4">⭐⭐⭐⭐ Bom</option>
<option value="3">⭐⭐⭐ Médio</option>
<option value="2">⭐⭐ Fraco</option>
<option value="1">⭐ Muito Mau</option>
</select>

<input id="user-${item.nome}" placeholder="Nickname ou Anónimo">

<textarea id="input-${item.nome}" placeholder="Partilha a tua experiência"></textarea>

<div style="margin-top:5px;">
<button onclick="like('${item.nome}')">👍</button>
<button onclick="dislike('${item.nome}')">👎</button>
</div>

<button onclick="enviar('${item.nome}')">Enviar</button>

<div id="score-${item.nome}" style="margin-top:10px;font-weight:bold;"></div>

<div id="comments-${item.nome}">A carregar...</div>

</div>
`;

container.appendChild(div);

carregarComentarios(item.nome);

});

}

/* COMENTÁRIOS */

window.enviar = async function(site){

const text=document.getElementById("input-"+site).value;
const rating=document.getElementById("rating-"+site).value;
const user=document.getElementById("user-"+site).value || "Anónimo";

if(!text)return alert("Escreve algo");

await addDoc(collection(db,"comments"),{
site:site,
text:text,
rating:Number(rating),
user:user,
likes:0,
dislikes:0,
date:Date.now()
});

document.getElementById("input-"+site).value="";

carregarComentarios(site);

}

window.enviar = async function(site){

const text=document.getElementById("input-"+site).value;

if(!text)return alert("Escreve algo");

await addDoc(collection(db,"comments"),{
site:site,
text:text,
date:Date.now()
});

carregarComentarios(site);

}

/* 👇 COLA AQUI */

window.likeComment = async function(id){

const ref = doc(db,"comments",id);

await updateDoc(ref,{
likes: increment(1)
});

location.reload();

}

window.dislikeComment = async function(id){

const ref = doc(db,"comments",id);

await updateDoc(ref,{
dislikes: increment(1)
});

location.reload();

}

window.like = async function(site){

alert("Like registado 👍 (vai aparecer nos próximos passos)");

}

window.dislike = async function(site){

alert("Dislike registado 👎 (vai aparecer nos próximos passos)");

}

async function carregarComentarios(site){

const q=query(collection(db,"comments"),where("site","==",site));

const res=await getDocs(q);

let html="";
let total=0;
let soma=0;
let count=0;

res.forEach(doc=>{

const d=doc.data();

count++;
soma+=d.rating;

html+=`
<div class="comment-box">

<div class="comment-user">${d.user}</div>

<div class="rating">⭐ ${d.rating}/5</div>

<p>${d.text}</p>

<div class="actions">
<button onclick="likeComment('${doc.id}')">👍 ${d.likes || 0}</button>
<button onclick="dislikeComment('${doc.id}')">👎 ${d.dislikes || 0}</button>
</div>

</div>
`;

});

let media = count ? (soma/count).toFixed(1) : 0;

document.getElementById("score-"+site).innerText =
"⭐ Rating: "+media+" ("+count+" avaliações)";

document.getElementById("comments-"+site).innerHTML =
html || "Sem comentários";

}

/* PESQUISA */

document.getElementById("searchInput").addEventListener("keyup",function(){

let v=this.value.toLowerCase();

let f=blacklist.filter(x=>x.nome.toLowerCase().includes(v));

render(f);

});

</script>

</body>
</html>
