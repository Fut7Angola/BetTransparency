<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<title>Blacklist de Casas de Apostas Ilegais em Portugal</title>
<meta name="description" content="Lista atualizada de sites de apostas ilegais em Portugal. Evita fraudes e protege o teu dinheiro.">
<meta name="keywords" content="casas apostas ilegais portugal, blacklist apostas, sites ilegais apostas">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-BM5P2FP1B1"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}

<style>
body{ font-family:Arial; margin:0; background:#eef2f7; }
main{ padding:90px 15px; max-width:1000px; margin:auto; }

.aviso-legal {
    background: #ffffff; padding: 20px; border-radius: 12px; border-left: 5px solid #b00020;
    margin-bottom: 25px; font-size: 14px; line-height: 1.6; color: #444; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

.search-container { margin-bottom: 30px; text-align: center; }
#searchInput {
    width: 100%; max-width: 500px; padding: 15px 20px; font-size: 16px; border: 2px solid #ddd;
    border-radius: 30px; outline: none; transition: all 0.3s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
}

.grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:15px; }

@media(max-width:768px){
    .grid{ grid-template-columns:repeat(2,1fr); gap:12px; }
    .card{ padding:12px; border-radius:12px; }
    .card h3{ font-size:14px; }
}

.card{
    background:white; padding:15px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.08);
    cursor:pointer; text-align:center; aspect-ratio:1/1; display:flex; align-items:center;
    justify-content:center; flex-direction:column; transition: transform 0.2s;
}
.card:hover { transform: translateY(-5px); }
.card h3{ margin:0; color:#b00020; }
.rating{ color:#f59f00; font-weight:bold; margin-top:5px; }

/* ESTILO PAGINAÇÃO */
.pagination {
    display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 30px; padding-bottom: 40px;
}
.btn-pag {
    background: #1c7ed6; color: white; border: none; padding: 12px 25px; border-radius: 8px;
    font-weight: bold; cursor: pointer; transition: opacity 0.3s;
}
.btn-pag:disabled { background: #ccc; cursor: not-allowed; }
#pageInfo { font-weight: bold; color: #444; }

/* MODAL */
.modal{ display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:flex-end; z-index: 1000; }
.modal-content{ background:white; width:100%; max-width:500px; max-height:90vh; border-radius:16px 16px 0 0; display:flex; flex-direction:column; overflow:hidden; }
.modal-header{ padding:15px; border-bottom:1px solid #eee; background:white; position:sticky; top:0; z-index:10; display: flex; justify-content: space-between; align-items: center; }
.modal-body{ padding:15px; overflow-y:auto; -webkit-overflow-scrolling: touch; }
textarea,input,select{ width:100%; margin-top:10px; padding:10px; border-radius:8px; border:1px solid #ddd; box-sizing: border-box; }
button{ background:#1c7ed6; color:white; border:none; padding:10px 15px; border-radius:8px; margin-top:10px; cursor:pointer; font-weight: bold; }
.comment{ background:#f1f3f5; padding:10px; border-radius:8px; margin-top:10px; }
</style>
</head>

<body>
<div id="header"></div>
<script>
fetch("header.html").then(res=>res.text()).then(data=>{
    document.getElementById("header").innerHTML=data;
    const btn = document.getElementById("menuBtn");
    const menu = document.getElementById("menu");
    if(btn && menu){ btn.onclick=function(){ menu.classList.toggle("show"); }; }
});
</script>

<main>
    <h1>🚨 Blacklist Operadores em Portugal</h1>
    <div class="aviso-legal">
        <p>A lista apresentada tem caráter informativo sobre riscos em canais de apostas e operadores não autorizados.</p>
    </div>

    <div class="search-container">
        <input id="searchInput" placeholder="Pesquisar por nome, site ou país...">
    </div>

    <div id="blacklist-container" class="grid"></div>

    <div class="pagination">
        <button id="prevBtn" class="btn-pag">Anterior</button>
        <span id="pageInfo">Página 1</span>
        <button id="nextBtn" class="btn-pag">Próximo</button>
    </div>
</main>

<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-nome" style="margin:0;"></h2>
            <button onclick="fecharModal()" style="margin:0; background:#666;">Fechar</button>
        </div>
        <div class="modal-body">
            <p id="modal-motivo"></p>
            <p id="modal-pais"></p>
            <a id="modal-link" target="_blank" style="color:#1c7ed6; word-break: break-all;"></a>
            <div id="modal-rating" style="margin-top:15px; font-weight:bold;"></div>
            <hr>
            <h3>💬 Comentários</h3>
            <div id="modal-comments"></div>
            <hr>
            <h3>✍️ Comentar</h3>
            <select id="modal-rating-input">
                <option value="5">⭐⭐⭐⭐⭐</option>
                <option value="1">⭐</option>
            </select>
            <input id="modal-user" placeholder="Nome">
            <textarea id="modal-text" placeholder="Escreve o teu comentário..."></textarea>
            <button onclick="enviarComentario()">Enviar Comentário</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
    apiKey:"AIzaSyB8zs1zhEmHeDZTyNwzKVx3LUUnmElMTec",
    authDomain:"bettransparency.firebaseapp.com",
    projectId:"bettransparency",
    appId:"1:493636447089:web:f5ceb8146a11a5b60364d0"
});
const db = getFirestore(app);
signInAnonymously(getAuth());

let blacklist = [];
let filteredList = [];
let currentPage = 1;
let currentSite = "";

// Define itens por página (20 PC, 10 Telemóvel)
const itemsPerPage = window.innerWidth <= 768 ? 10 : 20;

fetch("/data/blacklist.json")
    .then(r=>r.json())
    .then(data=>{
        blacklist = data;
        filteredList = data;
        renderPage();
    });

function renderPage() {
    const container = document.getElementById("blacklist-container");
    container.innerHTML = "";
    
    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const paginatedItems = filteredList.slice(start, end);

    paginatedItems.forEach(item => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <h3>${item.nome}</h3>
            <p style="font-size:12px;color:#666;">${item.pais || "🌍 País desconhecido"}</p>
            <div class="rating" id="rating-${item.nome.replace(/\s+/g, '-')}">⭐ ...</div>
        `;
        div.onclick = () => abrirModal(item);
        container.appendChild(div);
        carregarRating(item.nome);
    });

    actualizarBotoes();
    window.scrollTo(0, 0); // Volta ao topo ao mudar de página
}

function actualizarBotoes() {
    const totalPages = Math.ceil(filteredList.length / itemsPerPage);
    document.getElementById("pageInfo").innerText = `Página ${currentPage} de ${totalPages || 1}`;
    document.getElementById("prevBtn").disabled = currentPage === 1;
    document.getElementById("nextBtn").disabled = currentPage >= totalPages;
}

document.getElementById("prevBtn").onclick = () => {
    if(currentPage > 1) { currentPage--; renderPage(); }
};

document.getElementById("nextBtn").onclick = () => {
    const totalPages = Math.ceil(filteredList.length / itemsPerPage);
    if(currentPage < totalPages) { currentPage++; renderPage(); }
};

document.getElementById("searchInput").addEventListener("input", function(){
    let v = this.value.toLowerCase();
    filteredList = blacklist.filter(x => {
        let nome = (x.nome || "").toLowerCase();
        let site = (x.website || "").toLowerCase();
        let pais = (x.pais || "").toLowerCase();
        return nome.includes(v) || site.includes(v) || pais.includes(v);
    });
    currentPage = 1;
    renderPage();
});

/* AS RESTANTES FUNÇÕES (abrirModal, carregarRating, etc) CONTINUAM IGUAIS */
async function abrirModal(item){
    currentSite=item.nome;
    document.getElementById("modal").style.display="flex";
    document.getElementById("modal-nome").innerText=item.nome;
    document.getElementById("modal-motivo").innerText=item.motivo;
    document.getElementById("modal-pais").innerText = item.pais ? "🌍 País: " + item.pais : "🌍 País desconhecido";
    const link=document.getElementById("modal-link");
    link.href=item.website;
    link.innerText=item.website;
    carregarComentarios(item.nome);
}

window.fecharModal = function(){ document.getElementById("modal").style.display="none"; }
document.getElementById("modal").onclick = function(e){ if(e.target.id === "modal"){ fecharModal(); } }

window.enviarComentario = async function(){
    const text=document.getElementById("modal-text").value;
    const rating=document.getElementById("modal-rating-input").value;
    const user=document.getElementById("modal-user").value || "Anónimo";
    if(!text)return alert("Escreve algo");
    await addDoc(collection(db,"comments"),{ site:currentSite, text, rating:Number(rating), user, date:Date.now() });
    document.getElementById("modal-text").value="";
    carregarComentarios(currentSite);
    carregarRating(currentSite);
}

async function carregarComentarios(site){
    const q=query(collection(db,"comments"),where("site","==",site));
    const res=await getDocs(q);
    let html=""; let soma=0; let count=0;
    res.forEach(doc=>{
        const d=doc.data(); count++; soma+=d.rating;
        html+=`<div class="comment"><strong>${d.user}</strong> ⭐ ${d.rating}<p>${d.text}</p></div>`;
    });
    let media = count ? (soma/count).toFixed(1) : 0;
    document.getElementById("modal-rating").innerText = "⭐ "+media+" ("+count+" avaliações)";
    document.getElementById("modal-comments").innerHTML = html || "Sem comentários";
}

async function carregarRating(site){
    const q=query(collection(db,"comments"),where("site","==",site));
    const res=await getDocs(q);
    let soma=0; let count=0;
    res.forEach(doc=>{ soma+=doc.data().rating; count++; });
    let media = count ? (soma/count).toFixed(1) : "-";
    const ratingDiv = document.getElementById("rating-"+site.replace(/\s+/g, '-'));
    if(ratingDiv) ratingDiv.innerText = "⭐ "+media;
}
</script>

<div id="footer"></div>
<script>
fetch("footer.html").then(res=>res.text()).then(data=>{ document.getElementById("footer").innerHTML=data; });
</script>
</body>
</html>
