<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<title>Blacklist - Operadores Ilegais</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#eef2f7;
color:#222;
}

main{
padding:90px 20px;
max-width:1000px;
margin:auto;
}

h1{
text-align:center;
color:#0b132b;
margin-bottom:20px;
}

.card{
background:white;
border-radius:12px;
padding:20px;
margin-bottom:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.badge{
background:#ff4d4f;
color:white;
padding:5px 10px;
border-radius:20px;
font-size:12px;
display:inline-block;
margin-bottom:10px;
}

a{
color:#1c7ed6;
text-decoration:none;
font-weight:bold;
}

.comments{
margin-top:15px;
padding-top:10px;
border-top:1px solid #eee;
}

textarea, input, select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
margin-top:8px;
}

button{
background:#1c7ed6;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
margin-top:8px;
}

.comment-box{
background:#f1f3f5;
padding:10px;
border-radius:8px;
margin-top:10px;
}

.score{
margin-top:10px;
font-weight:bold;
}
  
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.2s;
text-align:center;
}

.card:hover{
transform:translateY(-3px);
}

.card h3{
margin:0;
font-size:16px;
color:#b00020;
}  

</style>

</head>

<body>

<div id="header"></div>

<script>
fetch("header.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("header").innerHTML=data;

const btn=document.getElementById("menuBtn");
const menu=document.getElementById("menu");

if(btn && menu){
btn.onclick=()=>menu.classList.toggle("show");
}
});

function abrirModal(item){

document.getElementById("modal").style.display="flex";

document.getElementById("modal-nome").innerText = item.nome;
document.getElementById("modal-motivo").innerText = item.motivo;

const link = document.getElementById("modal-link");
link.href = item.website;
link.innerText = item.website;

}

function fecharModal(){
document.getElementById("modal").style.display="none";
}
</script>

<main>

<h1>🚨 Lista Negra</h1>

<div id="site-counter">A carregar...</div>

<input id="searchInput" placeholder="Pesquisar...">

<div id="blacklist-container" class="grid"></div>

</main>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyB8zs1zhEmHeDZTyNwzKVx3LUUnmElMTec",
authDomain:"bettransparency.firebaseapp.com",
projectId:"bettransparency",
appId:"1:493636447089:web:f5ceb8146a11a5b60364d0"
});

const db = getFirestore(app);
signInAnonymously(getAuth());

let blacklist=[];

/* CARREGAR LISTA */

async function carregar(){

const res = await fetch("/data/blacklist.json");
blacklist = await res.json();

render(blacklist);

}

carregar();

/* RENDER */

div.onclick = function(){
abrirModal(item);
};
  
function render(lista){

const container=document.getElementById("blacklist-container");
container.innerHTML="";

document.getElementById("site-counter").innerText =
"Total: "+lista.length;

lista.forEach(item=>{

const div=document.createElement("div");

div.className="card";

div.innerHTML=`
<h3>${item.nome}</h3>
<p style="font-size:12px;color:#666;">Clique para ver detalhes</p>
`;
  
<div class="badge">Alto risco</div>

<h2>${item.nome}</h2>

<div class="score" id="score-${item.nome}"></div>

<p>${item.motivo}</p>

<a href="${item.website}" target="_blank">Abrir site</a>

<div class="comments">

<h3>⭐ Avaliação</h3>

<select id="rating-${item.nome}">
<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">⭐</option>
</select>

<input id="user-${item.nome}" placeholder="Nickname ou Anónimo">

<textarea id="input-${item.nome}" placeholder="Comentário"></textarea>

<button onclick="enviar('${item.nome}')">Enviar</button>

<div id="comments-${item.nome}">A carregar...</div>

</div>
`;

container.appendChild(div);

carregarComentarios(item.nome);

});

}

/* ENVIAR COMENTÁRIO */

window.enviar = async function(site){

const text=document.getElementById("input-"+site).value;
const rating=document.getElementById("rating-"+site).value;
const user=document.getElementById("user-"+site).value || "Anónimo";

if(!text)return alert("Escreve algo");

await addDoc(collection(db,"comments"),{
site,
text,
rating:Number(rating),
user,
likes:0,
dislikes:0,
date:Date.now()
});

document.getElementById("input-"+site).value="";

carregarComentarios(site);

}

/* CARREGAR COMENTÁRIOS */

async function carregarComentarios(site){

const q=query(collection(db,"comments"),where("site","==",site));
const res=await getDocs(q);

let html="";
let soma=0;
let count=0;

res.forEach(docu=>{

const d=docu.data();

count++;
soma+=d.rating;

html+=`
<div class="comment-box">
<strong>${d.user}</strong><br>
⭐ ${d.rating}/5
<p>${d.text}</p>

<button onclick="likeComment('${docu.id}')">👍 ${d.likes||0}</button>
<button onclick="dislikeComment('${docu.id}')">👎 ${d.dislikes||0}</button>

</div>
`;

});

let media = count ? (soma/count).toFixed(1) : 0;

document.getElementById("score-"+site).innerText =
"⭐ "+media+" ("+count+")";

document.getElementById("comments-"+site).innerHTML =
html || "Sem comentários";

}

/* LIKE / DISLIKE */

window.likeComment = async function(id){

await updateDoc(doc(db,"comments",id),{
likes: increment(1)
});

location.reload();

}

window.dislikeComment = async function(id){

await updateDoc(doc(db,"comments",id),{
dislikes: increment(1)
});

location.reload();

}

/* PESQUISA */

document.getElementById("searchInput").addEventListener("keyup",function(){

let v=this.value.toLowerCase();

let f=blacklist.filter(x=>x.nome.toLowerCase().includes(v));

render(f);

});

</script>

<div id="footer"></div>

<script>
fetch("footer.html")
.then(r=>r.text())
.then(d=>{
document.getElementById("footer").innerHTML=d;
});
</script>

<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center;">

<div style="background:white; padding:25px; border-radius:12px; max-width:500px; width:90%;">

<h2 id="modal-nome"></h2>

<p id="modal-motivo"></p>

<a id="modal-link" target="_blank">Abrir site</a>

<br><br>

<button onclick="fecharModal()">Fechar</button>

</div>

</div>  
</body>
</html>
