<style>

body{
font-family:Arial;
margin:0;
background:#eef2f7;
}

main{
padding:90px 15px;
max-width:1000px;
margin:auto;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
}

@media(max-width:768px){

.grid{
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.card{
padding:12px;
border-radius:12px;
}

.card h3{
font-size:14px;
}

}

/* CARD */
.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
cursor:pointer;
text-align:center;
aspect-ratio:1/1;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;  
}

.card h3{
margin:0;
color:#b00020;
}

.rating{
color:#f59f00;
font-weight:bold;
margin-top:5px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:flex-end; /* 🔥 MOBILE FIX */
}

/* 🔥 CAIXA */
.modal-content{
background:white;
width:100%;
max-width:500px;
max-height:90vh;
border-radius:16px 16px 0 0; /* 👈 topo arredondado */
display:flex;
flex-direction:column;
overflow:hidden;
}

/* 🔥 HEADER FIXO */
.modal-header{
padding:15px;
border-bottom:1px solid #eee;
background:white;
position:sticky;
top:0;
z-index:10;
}

/* 🔥 CORPO COM SCROLL */
.modal-body{
padding:15px;
overflow-y:auto;
-webkit-overflow-scrolling: touch; /* 👈 scroll suave iPhone */
}

textarea,input,select{
width:100%;
margin-top:10px;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
}

button{
background:#1c7ed6;
color:white;
border:none;

}

.comment{
background:#f1f3f5;
padding:10px;

margin-top:10px;
}

input, textarea{

}

</head>

<body>

<div id="header"></div>

<script>
fetch("header.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("header").innerHTML=data;

/* 🔥 MENU FUNCIONAR */
const btn = document.getElementById("menuBtn");
const menu = document.getElementById("menu");

if(btn && menu){
btn.onclick=function(){
menu.classList.toggle("show");
};
}

});
</script>

<main>

<h1>🚨 Blacklist Operadores em Portugal</h1>

<input id="searchInput" placeholder="Pesquisar...">

<div id="blacklist-container" class="grid"></div>

</main>

<!-- MODAL -->
<div id="modal" class="modal">

<div class="modal-content">

<div class="modal-header">
<h2 id="modal-nome"></h2>
<button onclick="fecharModal()">Fechar</button>
</div>

<script>

/* FECHAR AO CLICAR FORA */
document.getElementById("modal").onclick = function(e){
if(e.target.id === "modal"){
fecharModal();
}
}

</script>

<div class="modal-body">

<p id="modal-motivo"></p>

<p id="modal-pais"></p>

<a id="modal-link" target="_blank"></a>

<div id="modal-rating"></div>

<h3>💬 Comentários</h3>
<div id="modal-comments"></div>

<h3>✍️ Comentar</h3>

<select id="modal-rating-input">
<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">⭐</option>
</select>

<input id="modal-user" placeholder="Nome">

<textarea id="modal-text"></textarea>

<button onclick="enviarComentario()">Enviar</button>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* FIREBASE */
const app = initializeApp({
apiKey:"AIzaSyB8zs1zhEmHeDZTyNwzKVx3LUUnmElMTec",
authDomain:"bettransparency.firebaseapp.com",
projectId:"bettransparency",
appId:"1:493636447089:web:f5ceb8146a11a5b60364d0"
});

const db = getFirestore(app);
signInAnonymously(getAuth());

let blacklist=[];
let currentSite="";

/* LOAD */

fetch("/data/blacklist.json")
.then(r=>r.json())
.then(data=>{
blacklist=data;
render(data);
});

/* RENDER */

function render(lista){

const c=document.getElementById("blacklist-container");
c.innerHTML="";

lista.forEach(item=>{

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<h3>${item.nome}</h3>
<p style="font-size:12px;color:#666;">
${item.pais ? "🌍 " + item.pais : "🌍 País desconhecido"}
</p>
<div class="rating" id="rating-${item.nome}">⭐ ...</div>
`;

div.onclick=()=>abrirModal(item);

c.appendChild(div);

carregarRating(item.nome);

});

}

/* MODAL */

async function abrirModal(item){

currentSite=item.nome;

document.getElementById("modal").style.display="flex";

document.getElementById("modal-nome").innerText=item.nome;
document.getElementById("modal-motivo").innerText=item.motivo;
document.getElementById("modal-pais").innerText =
item.pais ? "🌍 País: " + item.pais : "🌍 País desconhecido";

const link=document.getElementById("modal-link");
link.href=item.website;
link.innerText=item.website;

carregarComentarios(item.nome);

}

window.fecharModal = function(){
document.getElementById("modal").style.display="none";
}

/* ENVIAR */

window.enviarComentario = async function(){

const text=document.getElementById("modal-text").value;
const rating=document.getElementById("modal-rating-input").value;
const user=document.getElementById("modal-user").value || "Anónimo";

if(!text)return alert("Escreve algo");

await addDoc(collection(db,"comments"),{
site:currentSite,
text,
rating:Number(rating),
user,
date:Date.now()
});

document.getElementById("modal-text").value="";

carregarComentarios(currentSite);
carregarRating(currentSite);

}

/* CARREGAR */

async function carregarComentarios(site){

const q=query(collection(db,"comments"),where("site","==",site));
const res=await getDocs(q);

let html="";
let soma=0;
let count=0;

res.forEach(doc=>{

const d=doc.data();

count++;
soma+=d.rating;

html+=`
<div class="comment">
<strong>${d.user}</strong> ⭐ ${d.rating}
<p>${d.text}</p>
</div>
`;

});

let media = count ? (soma/count).toFixed(1) : 0;

document.getElementById("modal-rating").innerText =
"⭐ "+media+" ("+count+" avaliações)";

document.getElementById("modal-comments").innerHTML =
html || "Sem comentários";

}

/* RATING NO CARD */

async function carregarRating(site){

const q=query(collection(db,"comments"),where("site","==",site));
const res=await getDocs(q);

let soma=0;
let count=0;

res.forEach(doc=>{
soma+=doc.data().rating;
count++;
});

let media = count ? (soma/count).toFixed(1) : "-";

document.getElementById("rating-"+site).innerText =
"⭐ "+media;

}

/* PESQUISA */

document.getElementById("searchInput").addEventListener("keyup",function(){

let v=this.value.toLowerCase();

let f=blacklist.filter(x=>x.nome.toLowerCase().includes(v));

render(f);

});

</script>

<!-- FOOTER -->
<div id="footer"></div>

<script>
fetch("footer.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("footer").innerHTML=data;
});
</script>


</body>
</html>
