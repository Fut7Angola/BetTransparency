<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<title>Blacklist - Operadores Ilegais</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#eef2f7;
color:#222;
}

main{
padding:90px 20px;
max-width:1000px;
margin:auto;
}

h1{
text-align:center;
color:#0b132b;
margin-bottom:20px;
}

/* GRID BONITO */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

/* CARDS */
.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.2s;
text-align:center;
}

.card:hover{
transform:translateY(-3px);
}

.card h3{
margin:0;
font-size:16px;
color:#b00020;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
margin-top:10px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:25px;
border-radius:12px;
max-width:500px;
width:90%;
}

button{
background:#1c7ed6;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

</style>

</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<script>
fetch("header.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("header").innerHTML=data;

const btn=document.getElementById("menuBtn");
const menu=document.getElementById("menu");

if(btn && menu){
btn.onclick=()=>menu.classList.toggle("show");
}
});
</script>

<main>

<h1>🚨 Lista Negra</h1>

<div id="site-counter">A carregar...</div>

<input id="searchInput" placeholder="Pesquisar...">

<div id="blacklist-container" class="grid"></div>

</main>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">

<h2 id="modal-nome"></h2>

<p id="modal-motivo"></p>

<a id="modal-link" target="_blank"></a>

<br>

<button onclick="fecharModal()">Fechar</button>

</div>
</div>

<!-- SCRIPT -->
<script>

let blacklist=[];

/* CARREGAR LISTA */

async function carregar(){

try{
const res = await fetch("/data/blacklist.json");
blacklist = await res.json();

render(blacklist);
}catch(e){
document.getElementById("blacklist-container").innerHTML = "Erro ao carregar dados";
}

}

carregar();

/* RENDER */

function render(lista){

const container=document.getElementById("blacklist-container");
container.innerHTML="";

document.getElementById("site-counter").innerText =
"Total: "+lista.length;

lista.forEach(item=>{

const div=document.createElement("div");

div.className="card";

div.innerHTML=`
<h3>${item.nome}</h3>
<p style="font-size:12px;color:#666;">Clique para ver detalhes</p>
`;

div.onclick=function(){
abrirModal(item);
};

container.appendChild(div);

});

}

/* MODAL */

function abrirModal(item){

document.getElementById("modal").style.display="flex";

document.getElementById("modal-nome").innerText = item.nome;
document.getElementById("modal-motivo").innerText = item.motivo;

const link=document.getElementById("modal-link");
link.href=item.website;
link.innerText=item.website;

}

function fecharModal(){
document.getElementById("modal").style.display="none";
}

/* PESQUISA */

document.getElementById("searchInput").addEventListener("keyup",function(){

let v=this.value.toLowerCase();

let f=blacklist.filter(x=>x.nome.toLowerCase().includes(v));

render(f);

});

</script>

<!-- FOOTER -->
<div id="footer"></div>

<script>
fetch("footer.html")
.then(r=>r.text())
.then(d=>{
document.getElementById("footer").innerHTML=d;
});
</script>

</body>
</html>
