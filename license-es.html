<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<title>Licenças Espanha</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial,sans-serif;
background:#eef2f7;
margin:0;
}

main{
max-width:1100px;
margin:40px auto;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

/* HERO */
.hero{
text-align:center;
padding:40px 20px;
background:linear-gradient(135deg,#e03131,#ff6b6b);
color:white;
border-radius:14px;
margin-bottom:30px;
}

/* SECÇÃO */
.section{
background:white;
padding:25px;
border-radius:14px;
margin-bottom:25px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

/* BOTÃO */
.btn{
display:inline-block;
padding:10px 16px;
background:#1c7ed6;
color:white;
text-decoration:none;
border-radius:8px;
font-size:14px;
font-weight:bold;
margin-top:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

/* CARD */
.card{
background:#f9fafd;
padding:20px;
border-radius:12px;
border:1px solid #e6ecf2;
text-align:center;
transition:0.2s;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.card h3{
margin:0 0 10px;
font-size:16px;
}

/* MULTI LINKS */
.links{
display:flex;
flex-wrap:wrap;
gap:6px;
justify-content:center;
}

.links a{
font-size:12px;
padding:6px 10px;
background:#1c7ed6;
color:white;
border-radius:6px;
text-decoration:none;
}

</style>

</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<script>

fetch("./data/operators-es.json")
.then(r=>r.json())
.then(data=>{

const container = document.getElementById("container");
container.innerHTML = "";

data.forEach(op=>{

const div = document.createElement("div");
div.className = "card";

/* gerar lista de sites */
let sitesHTML = "";

if(op.sites && op.sites.length > 0){

op.sites.forEach(s=>{
sitesHTML += `
<a href="${s.url}" target="_blank" class="site-link">
🌐 ${new URL(s.url).hostname}
</a>
`;
});

}else{
sitesHTML = `<p class="no-site">Sem site disponível</p>`;
}

div.innerHTML = `
<h3>${op.nome}</h3>
<div class="sites">${sitesHTML}</div>
`;

container.appendChild(div);

});

});

</script>

<main>

<!-- HERO -->
<div class="hero">
<h1>🇪🇸 Espanha</h1>
<p>Operadores licenciados pela DGOJ</p>
</div>

<!-- REGULADOR -->
<div class="section">

<h2>🏛 Entidade Reguladora</h2>

<p>Dirección General de Ordenación del Juego (DGOJ)</p>

<a href="https://www.ordenacionjuego.es" target="_blank" class="btn">
🌐 Visitar site oficial
</a>

</div>

<!-- OPERADORES -->
<div class="section">

<h2>✅ Operadores Legais</h2>

<div id="container" class="grid">
A carregar operadores...
</div>

</div>

</main>

<!-- FOOTER -->
<div id="footer"></div>

<script>
fetch("footer.html")
.then(r=>r.text())
.then(d=>{
document.getElementById("footer").innerHTML=d;
});
</script>

<script>

/* CARREGAR JSON */
fetch("./data/operators-es.json")
.then(r=>r.json())
.then(data=>{

const container = document.getElementById("container");
container.innerHTML = "";

/* ordenar alfabeticamente */
data.sort((a,b)=>a.nome.localeCompare(b.nome,'pt',{sensitivity:'base'}));

data.forEach(item=>{

const div = document.createElement("div");
div.className = "card";

/* criar links */
let linksHTML = "";

item.sites.forEach(site=>{
linksHTML += `<a href="${site}" target="_blank">Visitar</a>`;
});

div.innerHTML = `
<h3>${item.nome}</h3>
<div class="links">${linksHTML}</div>
`;

container.appendChild(div);

});

})
.catch(err=>{
document.getElementById("container").innerText = "Erro ao carregar operadores";
console.error(err);
});

</script>

</body>
</html>
