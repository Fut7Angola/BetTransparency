<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">

<title>Notícias de Apostas Online em Portugal | BetTransparency</title>

<meta name="description" content="Últimas notícias sobre apostas ilegais, fraudes online e operadores não licenciados em Portugal.">

<meta name="keywords" content="noticias apostas portugal, fraudes apostas online, casas ilegais portugal, alertas apostas">

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-BM5P2FP1B1"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-BM5P2FP1B1');
</script>  
<style>

body{
font-family:Arial;
margin:0;
background:#eef2f7;
}

main{
max-width:1000px;
margin:100px auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

/* TITULO */
h1{
text-align:center;
color:#0b132b;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:25px;
}

/* ALERTA */
.alert{
background:#ffe3e3;
border:1px solid #ff6b6b;
padding:15px;
border-radius:8px;
margin-bottom:20px;
}

/* 🔥 NOTICIA PRINCIPAL */
.main-news{
background:#f1f3f5;
padding:25px;
border-radius:12px;
margin-bottom:30px;
border-left:6px solid #e03131;
}

.main-news h2{
margin-top:0;
font-size:24px;
}

/* LISTA */
.news-list .box{
border:1px solid #e6ecf2;
padding:20px;
margin-bottom:15px;
border-radius:10px;
background:#f9fafd;
}

/* BOTÃO */
.btn{
display:inline-block;
margin-top:10px;
padding:10px 16px;
background:#1c7ed6;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.btn:hover{
opacity:0.9;
}

</style>

</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<script>
fetch("header.html")
.then(res => res.text())
.then(data => {

document.getElementById("header").innerHTML = data;

/* MENU MOBILE */
const btn = document.getElementById("menuBtn");
const menu = document.getElementById("menu");
const overlay = document.getElementById("overlay");
const dropdown = document.getElementById("dropdownBtn");

if(btn && menu){

btn.onclick = function(){
menu.classList.toggle("show");
overlay.classList.toggle("show");
btn.classList.toggle("active");
};

overlay.onclick = function(){
menu.classList.remove("show");
overlay.classList.remove("show");
btn.classList.remove("active");
};

if(dropdown){
dropdown.onclick = function(){
if(window.innerWidth < 768){
this.classList.toggle("active");
}
};
}

document.querySelectorAll(".menu a").forEach(link=>{
link.addEventListener("click", ()=>{
menu.classList.remove("show");
overlay.classList.remove("show");
btn.classList.remove("active");
});
});

}

});
</script>

<main>

<h1>📰 Notícias e Alertas</h1>

<p class="subtitle">
Atualizações sobre apostas ilegais e fraudes em Portugal
</p>

<div class="alert">
<strong>⚠️ Atenção:</strong>  
Novos esquemas surgem regularmente. Mantém-te informado.
</div>

<!-- 🔴 NOTICIA PRINCIPAL -->
<div id="main-news"></div>

<!-- 🔵 RESTANTES -->
<div id="news-list" class="news-list"></div>

</main>

<!-- FOOTER -->
<div id="footer"></div>

<script>
fetch("footer.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("footer").innerHTML=data;
});
</script>

<!-- SCRIPT -->
<script>

fetch("./data/news.json")
.then(r=>r.json())
.then(data=>{

/* ordenar por data */
data.sort((a,b)=> new Date(b.data) - new Date(a.data));

const main = document.getElementById("main-news");
const list = document.getElementById("news-list");

/* 🔴 PRIMEIRA = DESTAQUE */
const destaque = data[0];

main.innerHTML = `
<div class="main-news">
<h2>🚨 ${destaque.titulo}</h2>
<p><strong>Data:</strong> ${destaque.data} | <strong>${destaque.categoria}</strong></p>
<p>${destaque.resumo}</p>
<a href="${destaque.link}" class="btn">Ler mais</a>
</div>
`;

/* 🔵 RESTANTES */
data.slice(1).forEach(item=>{

const div = document.createElement("div");
div.className = "box";

div.innerHTML = `
<h3>${item.titulo}</h3>
<p><strong>${item.data}</strong> | ${item.categoria}</p>
<p>${item.resumo}</p>
<a href="${item.link}" class="btn">Ler mais</a>
`;

list.appendChild(div);

});

})
.catch(()=>{
document.getElementById("main-news").innerHTML = "Erro ao carregar notícias.";
});

</script>

</body>
</html>
