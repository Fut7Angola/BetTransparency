<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">

<title>Notícias de Apostas Online em Portugal | BetTransparency</title>

<meta name="description" content="Últimas notícias sobre apostas ilegais, fraudes online e operadores não licenciados em Portugal. Protege-te e mantém-te informado.">

<meta name="keywords" content="noticias apostas portugal, fraudes apostas online, casas ilegais portugal, alertas apostas, operadores não licenciados">

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#eef2f7;
}

main{
max-width:1000px;
margin:100px auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

h1{
text-align:center;
margin-bottom:10px;
color:#0b132b;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:25px;
}

.box{
border:1px solid #e6ecf2;
padding:20px;
margin-bottom:20px;
border-radius:10px;
background:#f9fafd;
}

.box h2{
margin-top:0;
}

.btn{
display:inline-block;
margin-top:10px;
padding:10px 16px;
background:#1c7ed6;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.btn:hover{
opacity:0.9;
}

.alert{
background:#ffe3e3;
border:1px solid #ff6b6b;
padding:15px;
border-radius:8px;
margin-bottom:20px;
}

</style>

</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<script>
fetch("header.html")
.then(res => res.text())
.then(data => {

document.getElementById("header").innerHTML = data;

/* MENU MOBILE */
const btn = document.getElementById("menuBtn");
const menu = document.getElementById("menu");
const overlay = document.getElementById("overlay");
const dropdown = document.getElementById("dropdownBtn");

if(btn && menu){

btn.onclick = function(){
menu.classList.toggle("show");
overlay.classList.toggle("show");
btn.classList.toggle("active");
};

overlay.onclick = function(){
menu.classList.remove("show");
overlay.classList.remove("show");
btn.classList.remove("active");
};

if(dropdown){
dropdown.onclick = function(){
if(window.innerWidth < 768){
this.classList.toggle("active");
}
};
}

document.querySelectorAll(".menu a").forEach(link=>{
link.addEventListener("click", ()=>{
menu.classList.remove("show");
overlay.classList.remove("show");
btn.classList.remove("active");
});
});

}

});
</script>

<!-- CONTEÚDO -->
<main>

<h1>📰 Notícias e Alertas</h1>

<p class="subtitle">
Atualizações sobre apostas ilegais, fraudes online e operadores não licenciados em Portugal
</p>

<div class="alert">
<strong>⚠️ Atenção:</strong>  
Novos esquemas surgem constantemente. Consulta esta página regularmente para te manteres protegido.
</div>

<div id="news-container">
<p>A carregar notícias...</p>
</div>

</main>

<!-- FOOTER -->
<div id="footer"></div>

<script>
fetch("footer.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("footer").innerHTML=data;
});
</script>

<!-- SCRIPT NOTÍCIAS -->
<script>

fetch("./data/news.json")
.then(r=>r.json())
.then(data=>{

const container = document.getElementById("news-container");

/* ordenar por data (mais recente primeiro) */
data.sort((a,b)=> new Date(b.data) - new Date(a.data));

container.innerHTML = "";

data.forEach(item=>{

const div = document.createElement("div");
div.className = "box";

div.innerHTML = `
<h2>${item.titulo}</h2>
<p><strong>Data:</strong> ${item.data} | <strong>Categoria:</strong> ${item.categoria}</p>
<p>${item.resumo}</p>
<a href="${item.link}" class="btn">Ler mais</a>
`;

container.appendChild(div);

});

})
.catch(()=>{
document.getElementById("news-container").innerHTML = "Erro ao carregar notícias.";
});

</script>

</body>
</html>
