<style>

.header{
background:#1f4cd1;
color:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
position:fixed;
top:0;
left:0;
right:0;
z-index:1000;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
box-sizing:border-box;
}

.logo img{
height:40px;
}

/* MENU DESKTOP */

.menu{
display:flex;
gap:20px;
align-items:center;
}

.menu a{
color:white;
text-decoration:none;
font-weight:bold;
}

.menu a:hover{
color:#4ade80;
}

/* SUBMENU */

.dropdown{
position:relative;
}

.dropdown-content{
display:none;
position:absolute;
background:#1f4cd1;
top:100%;
left:0;
min-width:220px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
padding:5px 0;
flex-direction:column;
}

.dropdown-content a{
display:block;
padding:10px 15px;
}

.dropdown:hover .dropdown-content{
display:flex;
}

  .dropdown{
position:relative;
padding-bottom:5px;
}
  
/* BOTÃO HAMBURGER */

.menu-btn{
display:none;
font-size:26px;
cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

.menu-btn{
display:block;
position:fixed;
top:15px;
right:15px;
background:#0b132b;
padding:8px 12px;
border-radius:6px;
z-index:2000;
}

.menu{
display:none;
flex-direction:column;
background:#0b132b;
position:fixed;
top:0;
right:0;
width:250px;
height:100vh;
padding:70px 20px;
z-index:1500;
box-shadow:-2px 0 10px rgba(0,0,0,0.3);
}

.menu.show{
display:flex;
}

.menu a{
padding:12px 0;
border-bottom:1px solid rgba(255,255,255,0.1);
}

/* SUBMENU MOBILE */

.dropdown-content{
position:relative;
top:0;
background:none;
box-shadow:none;
padding-left:10px;
}

.dropdown:hover .dropdown-content{
display:block;
}

}

</style>


<header class="header">

<a href="/" class="logo">
<img src="/images/logo.png" alt="BetTransparency">
</a>

<div class="menu-btn" id="menuBtn">☰</div>

<nav class="menu" id="menu">

<a href="/">Home</a>

<div class="dropdown">

<a href="#">Ferramentas ▾</a>

<div class="dropdown-content">
<a href="/license.html">Operadores Licenciados</a>
<a href="/blacklist.html">Blacklist</a>
<a href="/telegram.html">🚨 Telegram</a>  
<a href="/report.html">Denunciar Operador</a>
</div>

</div>

<a href="/guides.html">Guias</a>
<a href="/news.html">Notícias</a>
<a href="/about.html">Sobre</a>
<a href="/donations.html">Doações</a>

</nav>

</header>


<script>

document.addEventListener("DOMContentLoaded", function(){

const btn = document.getElementById("menuBtn");
const menu = document.getElementById("menu");

/* abrir menu mobile */

btn.addEventListener("click", function(){
menu.classList.toggle("show");
});

/* fechar menu ao clicar num link */

document.querySelectorAll(".menu a").forEach(link=>{
link.addEventListener("click", ()=>{
menu.classList.remove("show");
});
});

});

</script>
