<style>

.header{
background:#1f4cd1;
color:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
position:fixed;
top:0;
left:0;
right:0;
z-index:1000;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
}

.logo img{
height:40px;
}

/* MENU DESKTOP */

.menu{
display:flex;
gap:20px;
align-items:center;
}

.menu a{
color:white;
text-decoration:none;
font-weight:bold;
}

.menu a:hover{
color:#4ade80;
}

/* DROPDOWN */

.dropdown{
position:relative;
}

.dropdown-content{
display:none;
position:absolute;
background:#1f4cd1;
top:100%;
left:0;
min-width:220px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
padding:5px 0;
flex-direction:column;
}

.dropdown-content a{
display:block;
padding:10px 15px;
}

.dropdown:hover .dropdown-content{
display:flex;
}

/* BOTÃO HAMBURGER */

.menu-btn{
display:none;
flex-direction:column;
gap:5px;
cursor:pointer;
z-index:2000;
}

.menu-btn span{
width:25px;
height:3px;
background:white;
display:block;
transition:0.3s;
}

/* ANIMAÇÃO X */

.menu-btn.active span:nth-child(1){
transform:rotate(45deg) translate(5px,5px);
}

.menu-btn.active span:nth-child(2){
opacity:0;
}

.menu-btn.active span:nth-child(3){
transform:rotate(-45deg) translate(5px,-5px);
}

/* OVERLAY ESCURO */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:1400;
}

.overlay.show{
display:block;
}

/* MOBILE */

@media(max-width:768px){

.menu-btn{
display:flex;
position:fixed;
top:18px;
right:20px;
}

.menu{
flex-direction:column;
background:#0b132b; /* 🔥 COR ESCURA (ANTES ESTAVA BRANCO) */
position:fixed;
top:0;
right:-100%;
width:260px;
height:100vh;
padding:80px 20px;
transition:0.3s;
z-index:1500;
box-shadow:-5px 0 20px rgba(0,0,0,0.3);
}

.menu.show{
right:0;
}

.menu a{
color:white;
padding:12px 0;
border-bottom:1px solid rgba(255,255,255,0.1);
}

/* DROPDOWN MOBILE */

.dropdown-content{
position:relative;
background:none;
box-shadow:none;
display:none;
padding-left:10px;
}

.dropdown.active .dropdown-content{
display:block;
}

}

</style>

<header class="header">

<a href="/" class="logo">
<img src="/images/logo.png" alt="BetTransparency">
</a>

<!-- BOTÃO -->
<div class="menu-btn" id="menuBtn">
<span></span>
<span></span>
<span></span>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay"></div>

<nav class="menu" id="menu">

<a href="/">🏠 Home</a>

<div class="dropdown" id="dropdownBtn">

<a href="#">🛠️ Ferramentas ▾</a>

<div class="dropdown-content">
<a href="/license.html">✅ Operadores Licenciados</a>
<a href="/blacklist.html">🚨 Blacklist</a>
<a href="/telegram.html">📱 Telegram</a>
<a href="/report.html">📢 Denunciar Operador</a>
</div>

</div>

<a href="/guides.html">📚 Guias</a>
<a href="/news.html">📰 Notícias</a>
<a href="/about.html">ℹ️ Sobre</a>
<a href="/donations.html">💙 Doações</a>

</nav>

</header>

<script>

document.addEventListener("DOMContentLoaded", function(){

const btn = document.getElementById("menuBtn");
const menu = document.getElementById("menu");
const overlay = document.getElementById("overlay");
const dropdown = document.getElementById("dropdownBtn");

/* ABRIR MENU */

btn.addEventListener("click", function(){

menu.classList.toggle("show");
overlay.classList.toggle("show");
btn.classList.toggle("active");

});

/* FECHAR AO CLICAR FORA */

overlay.addEventListener("click", function(){

menu.classList.remove("show");
overlay.classList.remove("show");
btn.classList.remove("active");

});

/* DROPDOWN MOBILE */

dropdown.addEventListener("click", function(){

if(window.innerWidth < 768){
this.classList.toggle("active");
}

});

/* FECHAR AO CLICAR NUM LINK */

document.querySelectorAll(".menu a").forEach(link=>{
link.addEventListener("click", ()=>{
menu.classList.remove("show");
overlay.classList.remove("show");
btn.classList.remove("active");
});
});

});

</script>
