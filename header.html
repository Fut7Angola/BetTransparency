<style>

.header{
background:#1f4cd1;
color:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
position:fixed;
top:0;
left:0;
right:0;
z-index:1000;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
}

.logo img{
height:40px;
}

/* MENU DESKTOP */

.menu{
display:flex;
gap:20px;
align-items:center;
}

.menu a{
color:white;
text-decoration:none;
font-weight:bold;
}

.menu a:hover{
color:#4ade80;
}

/* DROPDOWN */

.dropdown{
position:relative;
}

.dropdown-content{
display:none;
position:absolute;
background:#1f4cd1;
top:100%;
left:0;
min-width:240px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
padding:5px 0;
flex-direction:column;
}

.dropdown-content a{
display:block;
padding:10px 15px;
}

.dropdown:hover .dropdown-content{
display:flex;
}

/* BOTÃO HAMBURGER */

.menu-btn{
display:none;
flex-direction:column;
gap:5px;
cursor:pointer;
z-index:2000;
}

.menu-btn span{
width:25px;
height:3px;
background:white;
display:block;
transition:0.3s;
}

/* ANIMAÇÃO X */

.menu-btn.active span:nth-child(1){
transform:rotate(45deg) translate(5px,5px);
}

.menu-btn.active span:nth-child(2){
opacity:0;
}

.menu-btn.active span:nth-child(3){
transform:rotate(-45deg) translate(5px,-5px);
}

/* OVERLAY */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:1400;
}

.overlay.show{
display:block;
}

/* MOBILE */

@media(max-width:768px){

.menu-btn{
display:flex;
position:fixed;
top:18px;
right:20px;
}

.menu{
flex-direction:column;
background:#0b132b;
position:fixed;
top:0;
right:-100%;
width:260px;
height:auto;
max-height:80vh;
overflow-y:auto;
padding:80px 20px;
transition:0.3s;
z-index:1500;
border-radius:0 0 0 16px;
}

.menu.show{
right:0;
}

.menu a{
display:block;
padding:12px 0;
}

/* DROPDOWN MOBILE */

.dropdown-content{
position:relative;
background:#111827;
border-radius:8px;
margin-top:8px;
display:none;
padding:5px 10px;
}

.dropdown.active .dropdown-content{
display:block;
}

}

</style>

<header class="header">

<a href="/" class="logo">
<img src="/images/logo.png" alt="BetTransparency">
</a>

<!-- BOTÃO -->
<div class="menu-btn" id="menuBtn">
<span></span>
<span></span>
<span></span>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay"></div>

<nav class="menu" id="menu">

<a href="/">🏠 Home</a>

<!-- FERRAMENTAS -->
<div class="dropdown" id="drop1">

<a href="#">🛠️ Ferramentas ▾</a>

<div class="dropdown-content">
<a href="/license.html">✅ Operadores Licenciados</a>
<a href="/blacklist.html">🚨 Blacklist Operadores</a>
<a href="/telegram.html">📱 Blacklist Telegram</a>
<a href="/report.html">📢 Denunciar Operador</a>
<a href="eu-licenses.html">🌍 Licenças Europeias</a>
</div>

</div>

<!-- EDUCAÇÃO -->
<div class="dropdown" id="drop2">

<a href="#">📚 Educação ▾</a>

<div class="dropdown-content">
<a href="/guides.html">🧠 Guias</a>
<a href="/legislacao.html">📖 Legislação</a>
<a href="/guia-seguranca.html">🛡️ Segurança</a>
</div>

</div>

<!-- AJUDA -->
<div class="dropdown" id="drop3">

<a href="#">🆘 Ajuda ▾</a>

<div class="dropdown-content">
<a href="/ajuda.html">📞 Apoio ao Jogador</a>
<a href="/livros.html">📚 Livros</a>
<a href="/autoexclusao.html">🛑 Autoexclusão</a>
<a href="experiencias.html">👎 Experiências Reais</a>
</div>

</div>

<a href="/news.html">📰 Notícias</a>
<a href="/about.html">ℹ️ Sobre</a>
<a href="/donations.html">💙 Doações</a>

</nav>

</header>

<script>

document.addEventListener("DOMContentLoaded", function(){

const btn = document.getElementById("menuBtn");
const menu = document.getElementById("menu");
const overlay = document.getElementById("overlay");

/* ABRIR MENU */
btn.addEventListener("click", function(){

menu.classList.toggle("show");
overlay.classList.toggle("show");
btn.classList.toggle("active");

});

/* FECHAR */
overlay.addEventListener("click", function(){

menu.classList.remove("show");
overlay.classList.remove("show");
btn.classList.remove("active");

});

/* DROPDOWNS MOBILE */
document.querySelectorAll(".dropdown").forEach(drop=>{
drop.addEventListener("click", function(){

if(window.innerWidth < 768){
this.classList.toggle("active");
}

});
});

/* FECHAR AO CLICAR LINK */
document.querySelectorAll(".menu a").forEach(link=>{
link.addEventListener("click", ()=>{
menu.classList.remove("show");
overlay.classList.remove("show");
btn.classList.remove("active");
});
});

});

</script>
