<style>

.header{
background:#0b132b;
color:white;
padding:15px 20px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
font-weight:bold;
font-size:18px;
}

.menu-btn{
font-size:26px;
cursor:pointer;
display:none;
}

/* MENU NORMAL (DESKTOP) */

.menu{
display:flex;
gap:20px;
}

.menu a{
color:white;
text-decoration:none;
font-weight:bold;
}

/* MOBILE */

@media(max-width:768px){

.menu-btn{
display:block;
}

/* MENU LATERAL */

.menu{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#0b132b;
display:flex;
flex-direction:column;
padding:30px 20px;
transition:0.3s;
z-index:999;
}

.menu a{
padding:12px 0;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.menu.show{
left:0;
}

}

</style>


<header class="header">

<div class="logo">
BetTransparency
</div>

<div class="menu-btn" id="menuBtn">
☰
</div>

<nav class="menu" id="menu">

<a href="/BetTransparency/">Home</a>

<a href="/BetTransparency/license.html">
Verificar Licenças
</a>

<a href="/BetTransparency/blacklist.html">
Blacklist
</a>

<a href="/BetTransparency/ads.html">
Análise de Publicidade
</a>

<a href="/BetTransparency/guides.html">
Guias
</a>

<a href="/BetTransparency/methodology.html">
Metodologia
</a>

<a href="/BetTransparency/news.html">
Notícias
</a>

<a href="/BetTransparency/about.html">
Sobre
</a>

</nav>

</header>


<script>

const btn = document.getElementById("menuBtn");
const menu = document.getElementById("menu");

/* ABRIR MENU */

btn.addEventListener("click", function(){
menu.classList.toggle("show");
});

/* FECHAR MENU AO CLICAR FORA */

document.addEventListener("click", function(e){

if(!menu.contains(e.target) && !btn.contains(e.target)){
menu.classList.remove("show");
}

});

</script>
