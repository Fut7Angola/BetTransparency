<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<title>Licenças Portugal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#eef2f7;
margin:0;
}

main{
max-width:900px;
margin:80px auto;
padding:20px;
}

.section{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

</style>

</head>

<body>

<div id="header"></div>

<main>

<p>Serviço de Regulação e Inspeção de Jogos (SRIJ)</p>
</div>

<div class="section">
<h2>✅ Operadores Legais</h2>

<ul>
<li>Betano</li>
<li>Betclic</li>
<li>ESC Online</li>
</ul>

</div>

</main>

<div id="footer"></div>

<script>
fetch("header.html").then(r=>r.text()).then(d=>{
document.getElementById("header").innerHTML=d;
});
fetch("footer.html").then(r=>r.text()).then(d=>{
document.getElementById("footer").innerHTML=d;
});
</script>

</body>
</html>
