<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<title>Denunciar Operador</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#eef2f7,#e6ecf5);
margin:0;
}

/* CONTAINER */
main{
max-width:650px;
margin:60px auto;
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* TITULO */
h1{
margin-top:0;
color:#1c1c1c;
}

/* TEXTO */
p{
color:#555;
}

/* LABEL */
label{
font-weight:bold;
font-size:14px;
color:#333;
}

/* INPUTS */
input,textarea{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:18px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
transition:0.2s;
}

/* FOCUS */
input:focus, textarea:focus{
border-color:#1c7ed6;
outline:none;
box-shadow:0 0 0 2px rgba(28,126,214,0.15);
}

/* BOTÃO */
button{
width:100%;
padding:14px;
background:linear-gradient(135deg,#1c7ed6,#1864ab);
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
font-weight:bold;
transition:0.2s;
}

button:hover{
transform:translateY(-1px);
box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

/* MENSAGEM */
#msg{
margin-top:15px;
font-weight:bold;
text-align:center;
}

</style>

</head>

<body>

<div id="header"></div>

<script>
fetch("header.html")
.then(res => res.text())
.then(data => {

document.getElementById("header").innerHTML = data;

const btn = document.getElementById("menuBtn");
const menu = document.getElementById("menu");

if(btn && menu){
btn.onclick=function(){
menu.classList.toggle("show");
};
}

});
</script>

<main>

<h1>⚠️ Denunciar Operador Suspeito</h1>

<p>Encontrou um site de apostas ilegal ou grupo de Telegram suspeito?  
Ajude-nos a identificar e proteger outros utilizadores.</p>

<form id="reportForm">

<label>Nome do Operador / Grupo</label>
<input type="text" name="operador" required>

<label>Website / Link</label>
<input type="text" name="website">

<label>Motivo da denúncia (opcional)</label>
<textarea name="motivo" rows="4"></textarea>

<label>Email (opcional)</label>
<input type="email" name="email">

<button type="submit">🚀 Enviar denúncia</button>

</form>

<p id="msg"></p>

<script>

document.getElementById("reportForm").addEventListener("submit", function(e){

e.preventDefault();

var formData = new FormData(this);

fetch("https://script.google.com/macros/s/AKfycbw_Sk8-MWoY14ZuqHa63vm_xqoeoChFnYFLQNyc4_jFhSDg52ffTHN4pZCg7NzKn1o8Lw/exec", {
method: "POST",
body: formData
})
.then(response => response.text())
.then(data => {

document.getElementById("msg").innerHTML =
"✅ Denúncia enviada com sucesso.";

document.getElementById("reportForm").reset();

})
.catch(error => {

document.getElementById("msg").innerHTML =
"❌ Erro ao enviar denúncia.";

console.error(error);

});

});

</script>

</main>

<div id="footer"></div>

<script>
fetch("footer.html")
.then(r=>r.text())
.then(d=>{
document.getElementById("footer").innerHTML=d;
});
</script>

</body>
</html>
