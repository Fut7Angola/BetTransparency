<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<title>Doações - BetTransparency</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#eef2f7;
color:#222;
}

main{
max-width:900px;
margin:40px auto;
padding:20px;
}

h1{
text-align:center;
color:#0b132b;
}

.donation-box{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
margin-bottom:30px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:12px 20px;
background:#1c7ed6;
border:none;
color:white;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
border-radius:10px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#0b132b;
color:white;
}

</style>

</head>

<body>

<div id="header"></div>

<script>
fetch("header.html")
.then(res=>res.text())
.then(data=>{

document.getElementById("header").innerHTML=data;

const btn=document.getElementById("menuBtn");
const menu=document.getElementById("menu");

if(btn && menu){
btn.onclick=function(){
menu.classList.toggle("show");
};
}

});
</script>

<main>

<h1>💙 Apoiar o Projeto</h1>

<div class="donation-box">

<p>
Se quiser apoiar o BetTransparency e ajudar a manter o projeto online,
pode fazer uma pequena doação.
</p>

<input type="text" id="nome" placeholder="Nome (ou deixar vazio para anónimo)">

<input type="number" id="valor" placeholder="Valor da doação (€)">

<button onclick="enviarDoacao()">Enviar Doação</button>

<div id="msg"></div>

</div>

<h2>📊 Doações Recebidas</h2>

<table>

<thead>
<tr>
<th>Nome</th>
<th>Valor (€)</th>
</tr>
</thead>

<tbody id="donations"></tbody>

</table>

</main>

<div id="footer"></div>

<script>
fetch("footer.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("footer").innerHTML=data;
});
</script>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbyY99-tq8W1rT3IH9IcRIHgjpYO9o4jUzD37Fe-eDOVLXlOS3j9SbBvbKUn5s7w-FScgA/exec"

/* ENVIAR DOAÇÃO */

function enviarDoacao(){

let nome=document.getElementById("nome").value.trim();
let valor=document.getElementById("valor").value;

if(valor===""){
alert("Indique o valor da doação.");
return;
}

if(nome===""){
nome="Anónimo";
}

fetch(scriptURL,{
method:"POST",
body:JSON.stringify({
nome:nome,
valor:valor
})
})

.then(res=>res.text())
.then(()=>{

document.getElementById("msg").innerHTML="Obrigado pela sua doação ❤️";

carregarDoacoes();

});

}

/* CARREGAR LISTA */

function carregarDoacoes(){

fetch(scriptURL)
.then(res=>res.json())
.then(data=>{

const tabela=document.getElementById("donations");
tabela.innerHTML="";

data.reverse().forEach(d=>{

const row=document.createElement("tr");

row.innerHTML=`
<td>${d.nome}</td>
<td>${d.valor} €</td>
`;

tabela.appendChild(row);

});

});

}

carregarDoacoes();

</script>

</body>
</html>
