<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<title>Doações - BetTransparency</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial,sans-serif;
margin:0;
background:#eef2f7;
color:#222;
}

main{
max-width:900px;
margin:100px auto;
padding:20px;
}

h1{
text-align:center;
color:#0b132b;
}

.donation-box{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
margin-bottom:30px;
}

button{
padding:12px 20px;
background:#1c7ed6;
border:none;
color:white;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
border-radius:10px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#0b132b;
color:white;
}

input, textarea{
font-size:16px;
}
  
</style>

</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<script>
fetch("header.html")
.then(res=>res.text())
.then(data=>{

document.getElementById("header").innerHTML=data;

/* 🔥 MENU MOBILE COMPLETO */
const btn = document.getElementById("menuBtn");
const menu = document.getElementById("menu");
const overlay = document.getElementById("overlay");
const dropdown = document.getElementById("dropdownBtn");

if(btn && menu){

btn.onclick = function(){
menu.classList.toggle("show");
overlay.classList.toggle("show");
btn.classList.toggle("active");
};

/* fechar ao clicar fora */
if(overlay){
overlay.onclick = function(){
menu.classList.remove("show");
overlay.classList.remove("show");
btn.classList.remove("active");
};
}

/* dropdown mobile */
if(dropdown){
dropdown.onclick = function(){
if(window.innerWidth < 768){
this.classList.toggle("active");
}
};
}

/* fechar ao clicar num link */
document.querySelectorAll(".menu a").forEach(link=>{
link.addEventListener("click", ()=>{
menu.classList.remove("show");
overlay.classList.remove("show");
btn.classList.remove("active");
});
});

}

});
</script>

<main>

<h1>💙 Apoiar o Projeto</h1>

<div class="donation-box">

<h2>Apoiar o projeto</h2>

<p>
Se quiser ajudar a manter o BetTransparency online,
pode fazer uma pequena doação através da plataforma abaixo.
</p>

<div style="display:flex;gap:20px;flex-wrap:wrap;margin-top:20px">

<a href="https://buymeacoffee.com/bettransparency" target="_blank">

<button style="
padding:14px 25px;
background:#ffdd00;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
">

☕ Doar com Buy Me a Coffee

</button>

</a>

</div>

<h2 style="margin-top:30px;">📊 Doações Recebidas</h2>

<table>

<thead>
<tr>
<th>Nome</th>
<th>Valor (€)</th>
</tr>
</thead>

<tbody id="donations"></tbody>

</table>

</div>

</main>

<!-- FOOTER -->
<div id="footer"></div>

<script>
fetch("footer.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("footer").innerHTML=data;
});
</script>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbyY99-tq8W1rT3IH9IcRIHgjpYO9o4jUzD37Fe-eDOVLXlOS3j9SbBvbKUn5s7w-FScgA/exec"

/* CARREGAR DOAÇÕES */
function carregarDoacoes(){

fetch(scriptURL)
.then(res=>res.json())
.then(data=>{

const tabela=document.getElementById("donations");
tabela.innerHTML="";

data.reverse().forEach(d=>{

const row=document.createElement("tr");

row.innerHTML=`
<td>${d.nome}</td>
<td>${d.valor} €</td>
`;

tabela.appendChild(row);

});

});

}

carregarDoacoes();

</script>

</body>
</html>
